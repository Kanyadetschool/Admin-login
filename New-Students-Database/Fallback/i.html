<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Information Document Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { font-size: 1.6rem; }
    .section { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 6px; }
    .field { display: grid; grid-template-columns: 250px 1fr; gap: 0.5rem; align-items: center; padding: 0.25rem 0; }
    label { font-weight: bold; }
    input[type="text"], input[type="email"] { width: 100%; padding: 0.5rem; border: 1px solid #aaa; border-radius: 4px; }
    .note { font-size: 0.95em; color: #555; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .col { flex: 1 1 300px; min-width: 280px; }
  </style>
</head>
<body>

  <h1>Information Document Form</h1>

  <form action="#" method="post" enctype="application/x-www-form-urlencoded">
    <div class="section" id="personal-info">
      <h2>Personal Information</h2>

      <div class="field">
        <label for="home_county">Home County</label>
        <input type="text" id="home_county" name="home_county" placeholder="e.g., Siaya" />
      </div>

      <div class="field">
        <label for="home_sub_county">Home Sub County</label>
        <input type="text" id="home_sub_county" name="home_sub_county" placeholder="e.g., SIAYA" />
      </div>

      <div class="field">
        <label for="postal_address">Postal Address</label>
        <input type="text" id="postal_address" name="postal_address" placeholder="e.g., NA" />
      </div>

      <div class="field">
        <label for="learner_email">Learner Email Address</label>
        <input type="email" id="learner_email" name="learner_email" placeholder="e.g., user@example.com" />
      </div>

      <div class="field">
        <label for="learner_mobile">Learner Mobile No</label>
        <input type="text" id="learner_mobile" name="learner_mobile" placeholder="e.g., 07XXXXXXXX" />
      </div>
    </div>

    <div class="section" id="mother-details">
      <h2>Mother's Details</h2>

      <div class="field">
        <label for="mother_idno">Mother's IDNO</label>
        <input type="text" id="mother_idno" name="mother_idno" placeholder="e.g., 1000000" />
      </div>

      <div class="field">
        <label for="mother_name">Mother's Name</label>
        <input type="text" id="mother_name" name="mother_name" placeholder="e.g., ROSE AKINYI ODENYO" />
      </div>

      <div class="field">
        <label for="mother_email">Mother's Email</label>
        <input type="email" id="mother_email" name="mother_email" placeholder="e.g., " />
      </div>

      <div class="field">
        <label for="mother_mobile">Mother's Mobile No</label>
        <input type="text" id="mother_mobile" name="mother_mobile" placeholder="e.g., 0700000000" />
      </div>
    </div>

    <div class="section" id="father-details">
      <h2>Father's Details</h2>

      <div class="field">
        <label for="father_idno">Father's IDNO</label>
        <input type="text" id="father_idno" name="father_idno" placeholder="e.g., NA" />
      </div>

      <div class="field">
        <label for="father_name">Father's Name</label>
        <input type="text" id="father_name" name="father_name" placeholder="e.g., NA" />
      </div>

      <div class="field">
        <label for="father_email">Father's Email</label>
        <input type="email" id="father_email" name="father_email" placeholder="e.g., " />
      </div>

      <div class="field">
        <label for="father_mobile">Father's Mobile No</label>
        <input type="text" id="father_mobile" name="father_mobile" placeholder="e.g., NA" />
      </div>
    </div>

    <div class="section" id="guardian-details">
      <h2>Guardian's Details</h2>

      <div class="field">
        <label for="guardian_idno">Guardian's IDNO</label>
        <input type="text" id="guardian_idno" name="guardian_idno" placeholder="e.g., NA" />
      </div>

      <div class="field">
        <label for="guardian_name">Guardian's Name</label>
        <input type="text" id="guardian_name" name="guardian_name" placeholder="e.g., NA" />
      </div>

      <div class="field">
        <label for="guardian_email">Guardian's Email</label>
        <input type="email" id="guardian_email" name="guardian_email" placeholder="e.g., " />
      </div>

      <div class="field">
        <label for="guardian_mobile">Guardian's Mobile No</label>
        <input type="text" id="guardian_mobile" name="guardian_mobile" placeholder="e.g., NA" />
      </div>
    </div>

    <div class="row" style="margin-top:1rem;">
      <button type="submit" style="padding:0.6rem 1rem;border-radius:6px;background:#4a90e2;border:none;color:white;">Submit</button>
      <button type="reset" style="padding:0.6rem 1rem;border-radius:6px;background:#ddd;border:none;color:#333;">Reset</button>
    </div>

  </form>

  <p class="note">Tip: You can customize the placeholders or add validation as needed.</p>

</body>
</html>
