function showLoader(show = true) {

function showStatus(message, type) {

function parseRawData(rawText) {
    const lines = rawText.split('\n').map(line => line.trim()).filter(line => line);
    const data = {
        assessmentNumber: '',
        fullName: '',
        gender: '',
        centreCode: '',
        centreName: '',
        subjects: [],
        pathways: {}
    };

    let isSubjectSection = false;
    let isPathwaySection = false;

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.startsWith('Assessment Number:')) data.assessmentNumber = line.split(':')[1].trim();
        else if (line.startsWith('Full Name:')) data.fullName = line.split(':')[1].trim();
        else if (line.startsWith('Gender:')) data.gender = line.split(':')[1].trim();
        else if (line.startsWith('Centre Code:')) data.centreCode = line.split(':')[1].trim();
        else if (line.startsWith('Centre Name:')) data.centreName = line.split(':')[1].trim();
        else if (line.includes('Learning Area Code') && line.includes('Learning Area Name')) { isSubjectSection = true; continue; }
        else if (line === 'Pathways') { isSubjectSection = false; isPathwaySection = true; continue; }
        else if (line.includes('© 2025 KNEC')) break;

        if (isSubjectSection && !isPathwaySection) {
            let parts = line.split('\t').filter(p => p.trim());
            if (parts.length < 4) parts = line.split(/\s{2,}/).filter(p => p.trim());
            if (parts.length < 4 && /\d/.test(line)) parts = line.split(/\s+/).filter(p => p.trim());

            if (parts.length >= 4) {
                let pointsIndex = -1;
                for (let j = 0; j < parts.length; j++) {
                    const val = parseInt(parts[j]);
                    if (!isNaN(val) && val >= 0 && val <= 12) { pointsIndex = j; break; }
                }
                if (pointsIndex > 0) {
                    const code = parts[0];
                    const name = parts.slice(1, pointsIndex - 1).join(' ');
                    const performanceLevel = parts[pointsIndex - 1] || '';
                    const points = parseInt(parts[pointsIndex]);
                    const description = parts.slice(pointsIndex + 1).join(' ');
                    data.subjects.push({ code, name, performanceLevel, points, description });
                }
            }
        }

        if (isPathwaySection && line.includes('Pathway')) {
            const pathwayName = line;
            const scoreLine = lines[i + 1];
            if (scoreLine && !isNaN(parseFloat(scoreLine))) {
                data.pathways[pathwayName] = parseFloat(scoreLine);
                i++;
            }
        }
    }

    data.timestamp = new Date().toISOString();
    data.totalPoints = data.subjects.reduce((sum, s) => sum + (s.points || 0), 0);
    data.avgPoints = data.subjects.length > 0 ? (data.totalPoints / data.subjects.length).toFixed(2) : 0;

    return data;
}

async function parseAndSave() {
    const rawData = document.getElementById('rawData').value.trim();
    if (!rawData) {
        showStatus('❌ Please paste assessment data first!', 'error');
        return;
    }

    try {
        showLoader(true);
        showStatus('🔄 Parsing data...', 'info');
        const parsedData = parseRawData(rawData);

        if (!parsedData.assessmentNumber) {
            showStatus('❌ Invalid data format.', 'error');
            showLoader(false);
            return;
        }

        showStatus('💾 Saving to database...', 'info');
        await db.ref('adminPortal/assessments/' + parsedData.assessmentNumber).set(parsedData);

        showStatus('✅ Record saved successfully!', 'success');
        document.getElementById('rawData').value = '';
        showLoader(false);
    } catch (error) {
        console.error(error);
        showStatus('❌ Error: ' + error.message, 'error');
        showLoader(false);
    }
}

        return;
    }
    records.forEach(record => container.appendChild(createRecordCard(record)));
}

function refreshDisplay() {
    filteredRecords = [...allRecords];
    populateCentreFilter();
    performSearch();
    updateStats();
    updateSummary();
}
function startRealTimeListeners() {
    // Show full-screen loader immediately
    showLoader(true);

    const container = document.getElementById('recordsContent');
    container.innerHTML = '';  // Clear any old content

    allRecords = [];
    const assessmentsRef = db.ref('adminPortal/assessments');

    let initialLoadComplete = false;

    // When all initial data is loaded (first snapshot)
    assessmentsRef.once('value').then((snapshot) => {
        // This runs once when all current data is fetched
        const data = snapshot.val();
        if (data) {
            allRecords = Object.values(data);
        }
        // Now refresh display and hide loader
        refreshDisplay();
        showLoader(false);  // Hide loader only after initial data is loaded
    });

    // Then continue listening for real-time updates
    assessmentsRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        if (data && !allRecords.find(r => r.assessmentNumber === data.assessmentNumber)) {
            allRecords.push(data);
            if (initialLoadComplete) {
                refreshDisplay();
            }
        }
    });

    assessmentsRef.on('child_changed', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const index = allRecords.findIndex(r => r.assessmentNumber === data.assessmentNumber);
            if (index !== -1) allRecords[index] = data;
            else allRecords.push(data);
            refreshDisplay();
        }
    });

    assessmentsRef.on('child_removed', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            allRecords = allRecords.filter(r => r.assessmentNumber !== data.assessmentNumber);
            refreshDisplay();
        }
    });

    // Mark initial load as complete after first full snapshot
    assessmentsRef.once('value').then(() => {
        initialLoadComplete = true;
    });
}
function populateCentreFilter() {
    const centres = [...new Set(allRecords.map(r => r.centreName).filter(Boolean))].sort();
    const select = document.getElementById('filterCentre');
    select.innerHTML = '<option value="">All Centres</option>';
    centres.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
}

function performSearch() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    filteredRecords = allRecords.filter(r =>
        !query ||
        (r.fullName?.toLowerCase().includes(query)) ||
        (r.assessmentNumber?.toLowerCase().includes(query)) ||
        (r.centreName?.toLowerCase().includes(query)) ||
        (r.centreCode?.toLowerCase().includes(query))
    );
    applyFilters();
}

function applyFilters() {
    const gender = document.getElementById('filterGender').value;
    const centre = document.getElementById('filterCentre').value;

    filteredRecords = filteredRecords.filter(r =>
        (!gender || r.gender === gender) &&
        (!centre || r.centreName === centre)
    );
    sortRecords();
}

function sortRecords() {
    const sortBy = document.getElementById('sortBy').value;
    filteredRecords.sort((a, b) => {
        switch(sortBy) {
            case 'newest': return new Date(b.timestamp) - new Date(a.timestamp);
            case 'oldest': return new Date(a.timestamp) - new Date(b.timestamp);
            case 'name-asc': return (a.fullName || '').localeCompare(b.fullName || '');
            case 'name-desc': return (b.fullName || '').localeCompare(a.fullName || '');
            case 'score-high': return (b.avgPoints || 0) - (a.avgPoints || 0);
            case 'score-low': return (a.avgPoints || 0) - (b.avgPoints || 0);
            default: return 0;
        }
    });
    displayRecords(filteredRecords);
}

function updateStats() {
    document.getElementById('totalRecords').textContent = allRecords.length;
    document.getElementById('totalStudents').textContent = allRecords.length;
    if (allRecords.length > 0) {
        const avg = (allRecords.reduce((s, r) => s + parseFloat(r.avgPoints || 0), 0) / allRecords.length).toFixed(1);
        document.getElementById('avgScore').textContent = avg;
    } else {
        document.getElementById('avgScore').textContent = '0';
    }
}

function updateSummary() {
    const el = document.getElementById('reportSummary');
    el.textContent = filteredRecords.length === allRecords.length
        ? `Showing all ${allRecords.length} records`
        : `Showing ${filteredRecords.length} of ${allRecords.length} records`;
}

function exportToCSV() {
    if (filteredRecords.length === 0) return alert('No records to export!');
    let csv = 'Assessment Number,Full Name,Gender,Centre Code,Centre Name,Total Points,Average Points\n';
    filteredRecords.forEach(r => {
        csv += `${r.assessmentNumber || ''},${r.fullName || ''},${r.gender || ''},${r.centreCode || ''},${r.centreName || ''},${r.totalPoints || 0},${r.avgPoints || 0}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `assessment-records-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function clearAll() {
    document.getElementById('rawData').value = '';
    document.getElementById('status').style.display = 'none';
}

async function printIndividualRecord(assessmentNumber) {
    const record = allRecords.find(r => r.assessmentNumber === assessmentNumber);
    if (!record) {
        alert('Record not found!');
        return;
    }

    showLoader(true);
    showStatus('🖨️ Generating PDF...', 'info');

    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait');

        await addPDFHeader(doc);
        let yPos = 45;

        yPos = addStudentInfoSection(doc, record, yPos);
        yPos = addSubjectsTable(doc, record, yPos);
        yPos = addPathwaysSection(doc, record, yPos);
        yPos = addSummaryStats(doc, record, yPos);

        addPDFFooter(doc, 1, 1);

        doc.save(`Assessment_Report_${record.fullName.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.pdf`);
        
        showStatus('✅ PDF generated successfully!', 'success');
    } catch (error) {
        console.error(error);
        showStatus('❌ Error generating PDF: ' + error.message, 'error');
    } finally {
        showLoader(false);
    }
}

        }

        // Add page numbers
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            addPDFFooter(doc, i, totalPages);
        }

        doc.save(`Assessment_Reports_Year_${year}_${new Date().toISOString().split('T')[0]}.pdf`);
        
        showStatus('✅ PDF generated successfully!', 'success');
    } catch (error) {
        console.error(error);
        showStatus('❌ Error generating PDF: ' + error.message, 'error');
    } finally {
        showLoader(false);
    }
}

function addFilterInfoToPDF(doc, yPos) {
    const activeFilters = [];
    
    const gender = document.getElementById('filterGender').value;
    const centre = document.getElementById('filterCentre').value;
    const sortBy = document.getElementById('sortBy').value;
    const searchQuery = document.getElementById('searchInput').value;
    
    if (gender) activeFilters.push(`Gender: ${gender}`);
    if (centre) activeFilters.push(`Centre: ${centre}`);
    if (searchQuery) activeFilters.push(`Search: "${searchQuery}"`);
    
    const sortLabels = {
        'newest': 'Newest First',
        'oldest': 'Oldest First',
        'name-asc': 'Name (A-Z)',
        'name-desc': 'Name (Z-A)',
        'score-high': 'Highest Score First',
        'score-low': 'Lowest Score First'
    };
    
    if (sortBy) activeFilters.push(`Sort: ${sortLabels[sortBy] || sortBy}`);
    
    if (activeFilters.length > 0) {
        doc.setFontSize(9);
        doc.setTextColor(100, 100, 100);
        doc.setFont(undefined, 'italic');
        doc.text('Active Filters: ' + activeFilters.join(' | '), 14, yPos);
        return yPos + 8;
    }
    
    return yPos;
}

async function printAllRecords() {
    if (filteredRecords.length === 0) {
        alert('No records available to print!');
        return;
    }

    const confirmed = confirm(`Generate PDF for ${filteredRecords.length} filtered/sorted records? This may take a while.`);
    if (!confirmed) return;

    showLoader(true);
    showStatus(`🖨️ Generating PDF for ${filteredRecords.length} records...`, 'info');

    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait');

        // ========== PAGE 1: SUMMARY PAGE ==========
        await addPDFHeader(doc, 'Complete Assessment Reports');
        
        let yPos = 50;
        
        // Add filter info
        yPos = addFilterInfoToPDF(doc, yPos);
        
        yPos += 5; // Add some spacing
        
        // Overall Statistics Section
        doc.setFontSize(16);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Overall Statistics', 14, yPos);
        
        yPos += 12;
        doc.setFontSize(11);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        const avgScore = (filteredRecords.reduce((s, r) => s + parseFloat(r.avgPoints || 0), 0) / filteredRecords.length).toFixed(2);
        const totalPoints = filteredRecords.reduce((s, r) => s + (r.totalPoints || 0), 0);
        
        // Create a nice stats box
        doc.setFillColor(245, 247, 250);
        doc.roundedRect(14, yPos, 182, 50, 3, 3, 'F');
        
        yPos += 12;
        doc.setFontSize(12);
        doc.setFont(undefined, 'bold');
        doc.text('Total Students:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(String(filteredRecords.length), 80, yPos);
        
        yPos += 12;
        doc.setFont(undefined, 'bold');
        doc.text('Average Score:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(`${avgScore} points`, 80, yPos);
        
        yPos += 12;
        doc.setFont(undefined, 'bold');
        doc.text('Total Points:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(String(totalPoints), 80, yPos);
        
        yPos += 20;
        
        // Additional summary statistics
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Distribution Summary', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        // Calculate gender distribution - FIXED
        const maleCount = filteredRecords.filter(r => {
            const gender = (r.gender || '').toLowerCase();
            return gender === 'male' || gender === 'm';
        }).length;
        
        const femaleCount = filteredRecords.filter(r => {
            const gender = (r.gender || '').toLowerCase();
            return gender === 'female' || gender === 'f';
        }).length;
        
        doc.text(`Male Students: ${maleCount}`, 20, yPos);
        yPos += 6;
        doc.text(`Female Students: ${femaleCount}`, 20, yPos);
        yPos += 10;
        
        // Calculate score ranges
        const scores = filteredRecords.map(r => parseFloat(r.avgPoints || 0));
        const highestScore = Math.max(...scores).toFixed(2);
        const lowestScore = Math.min(...scores).toFixed(2);
        
        doc.text(`Highest Average Score: ${highestScore} points`, 20, yPos);
        yPos += 6;
        doc.text(`Lowest Average Score: ${lowestScore} points`, 20, yPos);
        yPos += 10;
        
        // Centre distribution
        const centres = {};
        filteredRecords.forEach(r => {
            const centre = r.centreName || 'Unknown';
            centres[centre] = (centres[centre] || 0) + 1;
        });
        
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Students by Centre', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        Object.entries(centres)
            .sort((a, b) => b[1] - a[1])
            .forEach(([centre, count]) => {
                doc.text(`${centre}: ${count} student${count > 1 ? 's' : ''}`, 20, yPos);
                yPos += 6;
            });
        
        yPos += 5;
        
        // Top 5 performers
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Top 5 Performers', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        const topPerformers = [...filteredRecords]
            .sort((a, b) => (b.avgPoints || 0) - (a.avgPoints || 0))
            .slice(0, 5);
        
        topPerformers.forEach((record, index) => {
            doc.setFont(undefined, 'bold');
            doc.text(`${index + 1}.`, 20, yPos);
            doc.setFont(undefined, 'normal');
            doc.text(`${record.fullName} - ${record.avgPoints} points (${record.centreName})`, 28, yPos);
            yPos += 6;
        });

        // ========== PAGE 2 onwards: INDIVIDUAL RECORDS ==========
        for (let i = 0; i < filteredRecords.length; i++) {
            const record = filteredRecords[i];
            
            // Add new page for each record
            doc.addPage();
            await addPDFHeader(doc, 'Complete Assessment Reports');
            yPos = 45;

            yPos = addStudentInfoSection(doc, record, yPos);
            yPos = addSubjectsTable(doc, record, yPos);
            yPos = addPathwaysSection(doc, record, yPos);
            yPos = addSummaryStats(doc, record, yPos);
        }

        // Add page numbers to all pages
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            addPDFFooter(doc, i, totalPages);
        }

        doc.save(`Filtered_Assessment_Reports_${new Date().toISOString().split('T')[0]}.pdf`);
        
        showStatus('✅ PDF generated successfully!', 'success');
    } catch (error) {
        console.error(error);
        showStatus('❌ Error generating PDF: ' + error.message, 'error');
    } finally {
        showLoader(false);
    }
}


// Helper Functions for PDF Generation

async function addPDFHeader(doc, subtitle = 'Student Assessment Report') {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(0, 0, pageWidth, 35, 'F');
    
    try {
        const logoImg = new Image();
        logoImg.src = '../images/logo.png';
        logoImg.crossOrigin = 'anonymous';
        
        await new Promise((resolve) => {
            logoImg.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = logoImg.width;
                canvas.height = logoImg.height;
                ctx.drawImage(logoImg, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] > 0) {
                        data[i] = 255;
                        data[i + 1] = 255;
                        data[i + 2] = 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                doc.addImage(canvas.toDataURL(), 'PNG', 14, 7.5, 20, 20);
                resolve();
            };
            logoImg.onerror = () => resolve();
        });
    } catch (e) {
        console.log('Logo not available');
    }
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont(undefined, 'bold');
    doc.text('KANYADET PRIMARY & JUNIOR SCHOOL', pageWidth / 2, 15, { align: 'center' });
    
    doc.setFontSize(14);
    doc.text(subtitle, pageWidth / 2, 22, { align: 'center' });
    
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text('P.O. Box 45 - 40139 AKALA, Siaya, Kenya', pageWidth / 2, 29, { align: 'center' });
    
    doc.setDrawColor(41, 128, 185);
    doc.setLineWidth(0.5);
    doc.line(0, 35, pageWidth, 35);
}

function addPDFFooter(doc, pageNum, totalPages) {
    const pageWidth = doc.internal.pageSize.width;
    const pageHeight = doc.internal.pageSize.height;
    const footerY = pageHeight - 15;
    
    doc.setFillColor(245, 245, 245);
    doc.rect(0, footerY - 5, pageWidth, 20, 'F');
    
    doc.setDrawColor(41, 128, 185);
    doc.setLineWidth(0.3);
    doc.line(0, footerY - 5, pageWidth, footerY - 5);
    
    doc.setTextColor(60, 60, 60);
    doc.setFontSize(8);
    doc.setFont(undefined, 'bold');
    doc.text('Generated by:', 14, footerY);
    doc.setFont(undefined, 'normal');
    doc.text('Automated School System', 14, footerY + 4);
    
    doc.setFontSize(9);
    const pageText = `Page ${pageNum} of ${totalPages}`;
    doc.text(pageText, pageWidth / 2, footerY + 2, { align: 'center' });
    
    doc.setFontSize(7);
    doc.text(`Generated: ${new Date().toLocaleDateString()}`, pageWidth - 14, footerY + 2, { align: 'right' });
}

function addStudentInfoSection(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('STUDENT INFORMATION', 16, yPos + 5.5);
    
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    
    const infoData = [
        ['Full Name:', record.fullName || 'N/A', 'Gender:', record.gender || 'N/A'],
        ['Assessment No:', record.assessmentNumber || 'N/A', 'Exam Year:', record.examYear || 'N/A'],
        ['Centre Code:', record.centreCode || 'N/A', 'Centre Name:', record.centreName || 'N/A'],
        ['Total Points:', String(record.totalPoints || 0), 'Average Points:', String(record.avgPoints || 0)]
    ];
    
    infoData.forEach(row => {
        doc.setFont(undefined, 'bold');
        doc.text(row[0], 16, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(row[1], 50, yPos);
        
        doc.setFont(undefined, 'bold');
        doc.text(row[2], 110, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(row[3], 145, yPos);
        
        yPos += 6;
    });

    return yPos + 5;
}

function addSubjectsTable(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('LEARNING AREAS PERFORMANCE', 16, yPos + 5.5);
    
    yPos += 12;

    const subjectsData = (record.subjects || []).map(s => [
        s.code || '-',
        s.name || '-',
        s.performanceLevel || '-',
        String(s.points || 0),
        s.description || '-'
    ]);

    doc.autoTable({
        head: [['Code', 'Learning Areas', 'Performance', 'Points', 'Description']],
        body: subjectsData.length > 0 ? subjectsData : [['No Learning Areas data available', '', '', '', '']],
        startY: yPos,
        styles: { 
            fontSize: 9,
            cellPadding: 3
        },
        headStyles: { 
            fillColor: [41, 128, 185],
            textColor: [255, 255, 255],
            fontStyle: 'bold'
        },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        margin: { left: 14, right: 14 }
    });

    return doc.lastAutoTable.finalY + 10;
}

function addPathwaysSection(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('CAREER PATHWAYS', 16, yPos + 5.5);
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);

    const pathwaysData = Object.entries(record.pathways || {})
        .sort((a, b) => b[1] - a[1])
        .map(([pathway, score]) => [pathway, String(score)]);

    if (pathwaysData.length > 0) {
        doc.autoTable({
            head: [['Pathway', 'Score']],
            body: pathwaysData,
            startY: yPos,
            styles: { 
                fontSize: 9,
                cellPadding: 3
            },
            headStyles: { 
                fillColor: [41, 128, 185],
                textColor: [255, 255, 255],
                fontStyle: 'bold'
            },
            alternateRowStyles: { fillColor: [245, 245, 245] },
            margin: { left: 14, right: 14 },
            columnStyles: {
                0: { cellWidth: 140 },
                1: { cellWidth: 40, halign: 'center' }
            }
        });
        return doc.lastAutoTable.finalY + 10;
    } else {
        doc.setFont(undefined, 'normal');
        doc.text('No pathway data available', 16, yPos);
        return yPos + 10;
    }
}

function addSummaryStats(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    if (yPos > 240) {
        doc.addPage();
        yPos = 20;
    }
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('PERFORMANCE SUMMARY', 16, yPos + 5.5);
    
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    
    const subjectCount = (record.subjects || []).length;
    const topSubjects = (record.subjects || [])
        .sort((a, b) => b.points - a.points)
        .slice(0, 3);
    
    doc.setFont(undefined, 'bold');
    doc.text('Total Learning Areas Taken:', 16, yPos);
    doc.setFont(undefined, 'normal');
    doc.text(String(subjectCount), 65, yPos);
    
    yPos += 8;
    doc.setFont(undefined, 'bold');
    doc.text('Top 3 Learning Areas:', 16, yPos);
    yPos += 6;
    
    doc.setFont(undefined, 'normal');
    if (topSubjects.length > 0) {
        topSubjects.forEach((subject, index) => {
            doc.text(`${index + 1}. ${subject.name} - ${subject.points} points (${subject.performanceLevel})`, 20, yPos);
            yPos += 5;
        });
    } else {
        doc.text('No Learning Areas available', 20, yPos);
        yPos += 5;
    }
    
    yPos += 5;
    const timestamp = record.timestamp ? new Date(record.timestamp).toLocaleString() : 'N/A';
    doc.setFontSize(8);
    doc.setTextColor(100, 100, 100);
    doc.text(`Report generated on: ${timestamp}`, 16, yPos);
    
    return yPos + 10;
}

    document.getElementById('sortBy').addEventListener('change', sortRecords);
});
