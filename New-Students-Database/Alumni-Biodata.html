<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni biodata Data Reporter - Advanced</title>
    <link rel="stylesheet" href="biodata.css">
    <script src="https://cdn.tailwindcss.com"></script>

  
</head>
<body>



<!-- Toggle Button (just the icon button) -->
    <script src="https://cdn.tailwindcss.com"></script>
<button id="toggleBtn" class="fixed bottom-6 right-6 flex items-center justify-center w-16 h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
</button>

<!-- Modal wrapper (empty, JS will fill content) -->
<div id="linkModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-70 hidden">
<div id="modalContent" class="bg-white rounded-2xl p-6 md:p-8 shadow-2xl max-w-lg w-full h-[80vh] overflow-y-scroll [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden transform">

        <!-- JS will inject modal content here -->
    </div>
</div>




    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            
            <h1><img src="../img/logo.png" alt="" class="logo"> Advanced Alumni Students biodata Portal
                 <p> 🎓Track and manage student biodata information with ease</p>
            </h1>
           
        </div>

        <div class="auth-section">
            <div id="user-info">Please sign in to access the system</div>
            <div>
                <button id="google-sign-in-btn">🔐 Sign in with Google</button>
                <button id="sign-out-btn">🚪 Sign Out</button>
            </div>
           
             

        </div>

        <div class="controls">
            
            <div class="control-group">
                <label for="grade-filter">📚 Filter by Year of Graduation</label>
                <select id="grade-filter">
                    <option value="">All Years</option>
                </select>
            </div>

       

            <div class="control-group">
                <label for="search-input">🔍 Search Students</label>
                <input type="text" id="search-input" placeholder="Search by name, UPI, phone...">
            </div>

            <div class="control-group">
                <label for="items-per-page">📄 Items Per Page</label>
                <select id="items-per-page">
                    <option value="10">10 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                    <option value="100">100 per page</option>
                </select>
            </div>



   <div class="control-group">
    <label for="field-filter">📋 Configure a field</label>
    <select id="field-filter">
        <option value="">Select Field...</option>
    </select>
</div>

<!-- ADD THIS NEW SECTION -->
<div id="selected-fields-container" style="display: none; margin-top: 10px;">
    <label style="font-weight: 600; color: #f32b1c; margin-bottom: 8px; display: block;">
        Selected Fields:
    </label>
    <div id="selected-fields-tags" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
</div>


        </div>

        <div id="print-area">
           <div class="report-header">
               <div id="report-summary">No data loaded yet</div>
               <button class="export-btn" onclick="exportMissingDataToPdf()">📥 Export to PDF</button>
           </div>

            <div class="table-container">
                <table id="missing-data-table">
                   <thead>
    <tr>
        <th>SN</th>
        <th>Grade</th>
        <th>Student Name</th>
        <th>Assessment No</th>
        <th>UPI</th>
        <th>Home Phone</th>
        <th>Parent Name</th> <!-- NEW COLUMN -->
        <th>IDNO</th> <!-- NEW COLUMN -->
        <th>Medical Condition</th> <!-- NEW COLUMN -->
    </tr>
</thead>
                    <tbody>
                        <tr>
                            <td colspan="9" style="text-align: center;"> <!-- Update number -->
                                Sign in to load student data
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-section">
                <div id="pagination-info"></div>
                <div id="pagination-controls"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        window.firebaseImports = {
            initializeApp,
            getDatabase,
            ref,
            onValue,
            update,
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        };
    </script>

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Your Application Script -->
    <script src="./js/Alumni-Toggle.js"></script>

    <script src="Alumni-Biodata.js"></script>
</body>
</html>
