function parseRawData(rawText) {
    const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
    const data = {
        assessmentNumber: '',
        fullName: '',
        gender: '',
        centreCode: '',
        centreName: '',
        examYear: document.getElementById('examYear')?.value.trim() || new Date().getFullYear().toString(),
        papers: [] // Changed from 'subjects' to 'papers'
    };

    let isPaperSection = false;
    let currentPaper = null;

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Extract basic info
        if (line.startsWith('Assessment Number:')) {
            data.assessmentNumber = line.split(':')[1].trim();
        }
        else if (line.startsWith('Full Name:')) {
            data.fullName = line.split(':')[1].trim();
        }
        else if (line.startsWith('Gender:')) {
            data.gender = line.split(':')[1].trim();
        }
        else if (line.startsWith('Centre Code:')) {
            data.centreCode = line.split(':')[1].trim();
        }
        else if (line.startsWith('Centre Name:')) {
            data.centreName = line.split(':')[1].trim();
        }
        else if (line.includes('Paper Code') && line.includes('Paper Name')) {
            isPaperSection = true;
            continue;
        }
        else if (line.includes('© 2026 KNEC') || line.includes('© 2025 KNEC')) {
            break;
        }

        // Parse paper section
        if (isPaperSection) {
            // Check if line starts with paper code (3 digits)
            if (/^\d{3}/.test(line)) {
                // Save previous paper if exists
                if (currentPaper) {
                    data.papers.push(currentPaper);
                }

                // Start new paper
                const paperCode = line.substring(0, 3);
                const paperName = line.substring(3).trim();
                
                currentPaper = {
                    paperCode,
                    paperName,
                    subjects: [],
                    performanceLevels: []
                };
            }
            // Lines after paper code are subjects and performance levels
            else if (currentPaper && line.length > 0) {
                // Check if it's a performance level
                if (line.includes('Expectation') || line.includes('Exceeding')) {
                   currentPaper.performanceLevels.push(line.trim());
                }
                // Otherwise, it's a subject
                else {
                    currentPaper.subjects.push(line);
                }
            }
        }
    }

    // Don't forget to add the last paper
    if (currentPaper) {
        data.papers.push(currentPaper);
    }

    data.timestamp = new Date().toISOString();
    
    // Calculate performance-based metrics
    const performanceMap = {
        'Exceeding Expectation': 4,
        'Meeting Expectation': 3,
        'Approaching Expectation': 2,
        'Below Expectation': 1
    };
    
    let totalScore = 0;
    let totalSubjects = 0;
    
    data.papers?.forEach(p => {
        p.performanceLevels?.forEach(level => {
            totalScore += performanceMap[level] || 0;
            totalSubjects++;
        });
    });
    
    data.totalPoints = totalScore;
    data.avgPoints = totalSubjects > 0 ? (totalScore / totalSubjects).toFixed(2) : 0;

    return data;
}
async function parseAndSave() {
    const rawData = document.getElementById('rawData').value.trim();
    if (!rawData) {
        showStatus('❌ Please paste assessment data first!', 'error');
        return;
    }

    try {
        showLoader(true);
        showStatus('🔄 Parsing data...', 'info');
        const parsedData = parseRawData(rawData);

        if (!parsedData.assessmentNumber) {
            showStatus('❌ Invalid data format.', 'error');
            showLoader(false);
            return;
        }

        showStatus('💾 Saving to database...', 'info');
        await db.ref('Kpsea-adminPortal/assessments/' + parsedData.assessmentNumber).set(parsedData);

        showStatus('✅ Record saved successfully!', 'success');
        document.getElementById('rawData').value = '';
        showLoader(false);
    } catch (error) {
        console.error(error);
        showStatus('❌ Error: ' + error.message, 'error');
        showLoader(false);
    }
}

function startRealTimeListeners() {
    // Show full-screen loader immediately
    showLoader(true);

    const container = document.getElementById('recordsContent');
    container.innerHTML = '';  // Clear any old content

    allRecords = [];
    const assessmentsRef = db.ref('Kpsea-adminPortal/assessments');

    let initialLoadComplete = false;

    // When all initial data is loaded (first snapshot)
    assessmentsRef.once('value').then((snapshot) => {
        // This runs once when all current data is fetched
        const data = snapshot.val();
        if (data) {
            allRecords = Object.values(data);
        }
        // Now refresh display and hide loader
        refreshDisplay();
        showLoader(false);  // Hide loader only after initial data is loaded
    });

    // Then continue listening for real-time updates
    assessmentsRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        if (data && !allRecords.find(r => r.assessmentNumber === data.assessmentNumber)) {
            allRecords.push(data);
            if (initialLoadComplete) {
                refreshDisplay();
            }
        }
    });

    assessmentsRef.on('child_changed', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const index = allRecords.findIndex(r => r.assessmentNumber === data.assessmentNumber);
            if (index !== -1) allRecords[index] = data;
            else allRecords.push(data);
            refreshDisplay();
        }
    });

    assessmentsRef.on('child_removed', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            allRecords = allRecords.filter(r => r.assessmentNumber !== data.assessmentNumber);
            refreshDisplay();
        }
    });

    // Mark initial load as complete after first full snapshot
    assessmentsRef.once('value').then(() => {
        initialLoadComplete = true;
    });
}

// UPDATE your existing applyFilters() function to include year filter:
function applyFilters() {
    filteredRecords = allRecords.filter(r => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const gender = document.getElementById('filterGender').value;
        const centre = document.getElementById('filterCentre').value;
        const year = document.getElementById('filterYear').value;
        
        return (!query || r.fullName?.toLowerCase().includes(query)) &&
               (!gender || r.gender === gender) &&
               (!centre || r.centreName === centre) &&
               (!year || r.examYear === year);
    });
    sortRecords();
}

function sortRecords() {
    const sortBy = document.getElementById('sortBy').value;
    
    filteredRecords.sort((a, b) => {
        switch(sortBy) {
            case 'newest': 
                return new Date(b.timestamp) - new Date(a.timestamp);
            
            case 'oldest': 
                return new Date(a.timestamp) - new Date(b.timestamp);
            
            case 'name-asc': 
                return (a.fullName || '').localeCompare(b.fullName || '');
            
            case 'name-desc': 
                return (b.fullName || '').localeCompare(a.fullName || '');
            
            case 'score-high': {
                // Calculate average performance for both records
                const perfMapA = getAvgPerformance(a);
                const perfMapB = getAvgPerformance(b);
                return perfMapB - perfMapA; // Highest first
            }
            
            case 'score-low': {
                // Calculate average performance for both records
                const perfMapA = getAvgPerformance(a);
                const perfMapB = getAvgPerformance(b);
                return perfMapA - perfMapB; // Lowest first
            }
            
            default: 
                return 0;
        }
    });
    
    displayRecords(filteredRecords);
}

// Helper function to calculate average performance
function getAvgPerformance(record) {
    const performanceMap = {
        'Exceeding Expectation': 4,
        'Meeting Expectation': 3,
        'Approaching Expectation': 2,
        'Below Expectation': 1
    };
    
    let totalScore = 0;
    let totalSubjects = 0;
    
    record.papers?.forEach(p => {
        p.performanceLevels?.forEach(level => {
            totalScore += performanceMap[level] || 0;
            totalSubjects++;
        });
    });
    
    return totalSubjects > 0 ? (totalScore / totalSubjects) : 0;
}
function updateStats() {
    document.getElementById('totalRecords').textContent = allRecords.length;
    document.getElementById('totalStudents').textContent = allRecords.length;
    
    // Calculate average based on performance levels
    const performanceMap = {
        'Exceeding Expectation': 4,
        'Meeting Expectation': 3,
        'Approaching Expectation': 2,
        'Below Expectation': 1
    };
    
    if (allRecords.length > 0) {
        let totalScore = 0;
        let totalSubjects = 0;
        
        allRecords.forEach(r => {
            r.papers?.forEach(p => {
                p.performanceLevels?.forEach(level => {
                    totalScore += performanceMap[level] || 0;
                    totalSubjects++;
                });
            });
        });
        
        const avg = totalSubjects > 0 ? (totalScore / totalSubjects).toFixed(1) : 0;
        document.getElementById('avgScore').textContent = avg;
    } else {
        document.getElementById('avgScore').textContent = '0';
    }

function calculateLearningAreasAnalytics(records) {
    const analytics = {
        bySubject: {},
        byPerformanceLevel: {},
        totalStudents: records.length,
        totalSubjectEntries: 0
    };

    const performanceMap = {
        'Exceeding Expectation': 4,
        'Meeting Expectation': 3,
        'Approaching Expectation': 2,
        'Below Expectation': 1
    };

    // Collect all subject data from papers
    records.forEach(record => {
        if (!record.papers) return;
        
        record.papers.forEach(paper => {
            paper.subjects?.forEach((subject, index) => {
                const subjectName = subject || 'Unknown';
                const performanceLevel = paper.performanceLevels?.[index] || 'Unknown';
                const points = performanceMap[performanceLevel] || 0;

                // Initialize subject analytics if not exists
                if (!analytics.bySubject[subjectName]) {
                    analytics.bySubject[subjectName] = {
                        name: subjectName,
                        code: paper.paperCode,
                        totalPoints: 0,
                        count: 0,
                        avgPoints: 0,
                        highestScore: 0,
                        lowestScore: 4,
                        students: [],
                        performanceLevels: {}
                    };
                }

                // Update subject statistics
                const subjectAnalytics = analytics.bySubject[subjectName];
                subjectAnalytics.totalPoints += points;
                subjectAnalytics.count++;
                subjectAnalytics.highestScore = Math.max(subjectAnalytics.highestScore, points);
                subjectAnalytics.lowestScore = Math.min(subjectAnalytics.lowestScore, points);
                
                // Store student performance
                subjectAnalytics.students.push({
                    name: record.fullName,
                    points: points,
                    performanceLevel: performanceLevel,
                    gender: record.gender,
                    centre: record.centreName
                });

                // Count performance levels
                if (!subjectAnalytics.performanceLevels[performanceLevel]) {
                    subjectAnalytics.performanceLevels[performanceLevel] = 0;
                }
                subjectAnalytics.performanceLevels[performanceLevel]++;

                // Count overall performance levels
                if (!analytics.byPerformanceLevel[performanceLevel]) {
                    analytics.byPerformanceLevel[performanceLevel] = 0;
                }
                analytics.byPerformanceLevel[performanceLevel]++;

                analytics.totalSubjectEntries++;
            });
        });
    });

    // Calculate averages and rankings
    Object.values(analytics.bySubject).forEach(subject => {
        subject.avgPoints = (subject.totalPoints / subject.count).toFixed(2);
        subject.students.sort((a, b) => b.points - a.points);
    });

    // Create ranked list of subjects
    analytics.rankedSubjects = Object.values(analytics.bySubject)
        .sort((a, b) => b.avgPoints - a.avgPoints);

    return analytics;
}
function getSubjectPerformanceColor(avgPoints) {
    if (avgPoints >= 10) return [46, 204, 113]; // Green - Excellent
    if (avgPoints >= 8) return [52, 152, 219]; // Blue - Good
    if (avgPoints >= 6) return [241, 196, 15]; // Yellow - Satisfactory
    if (avgPoints >= 4) return [230, 126, 34]; // Orange - Needs Improvement
    return [231, 76, 60]; // Red - Poor
}

function getPerformanceLevelColor(level) {
    // Normalize the level string
    const normalizedLevel = (level || '').toLowerCase();
    
    // Check for common performance level patterns
    if (normalizedLevel.includes('exceed') || normalizedLevel.includes('excellent') || normalizedLevel.includes('outstanding')) {
        return [46, 204, 113]; // Green
    }
    if (normalizedLevel.includes('meet') || normalizedLevel.includes('proficient') || normalizedLevel.includes('good')) {
        return [52, 152, 219]; // Blue
    }
    if (normalizedLevel.includes('approach') || normalizedLevel.includes('developing') || normalizedLevel.includes('satisfactory')) {
        return [241, 196, 15]; // Yellow
    }
    if (normalizedLevel.includes('below') || normalizedLevel.includes('emerging') || normalizedLevel.includes('needs')) {
        return [231, 76, 60]; // Red
    }
    
    // Default for unknown levels
    return [149, 165, 166]; // Gray
}

function exportToCSV() {
    if (filteredRecords.length === 0) return alert('No records to export!');
    let csv = 'Assessment Number,Full Name,Gender,Centre Code,Centre Name,Total Points,Average Points\n';
    filteredRecords.forEach(r => {
        csv += `${r.assessmentNumber || ''},${r.fullName || ''},${r.gender || ''},${r.centreCode || ''},${r.centreName || ''},${r.totalPoints || 0},${r.avgPoints || 0}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `assessment-records-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

    if (gender) activeFilters.push(`Gender: ${gender}`);
    if (centre) activeFilters.push(`Centre: ${centre}`);
    if (searchQuery) activeFilters.push(`Search: "${searchQuery}"`);
    
    const sortLabels = {
        'newest': 'Newest First',
        'oldest': 'Oldest First',
        'name-asc': 'Name (A-Z)',
        'name-desc': 'Name (Z-A)',
        'score-high': 'Highest Score First',
        'score-low': 'Lowest Score First'
    };
    
    if (sortBy) activeFilters.push(`Sort: ${sortLabels[sortBy] || sortBy}`);
    
    if (activeFilters.length > 0) {
        doc.setFontSize(9);
        doc.setTextColor(100, 100, 100);
        doc.setFont(undefined, 'italic');
        doc.text('Active Filters: ' + activeFilters.join(' | '), 14, yPos);
        return yPos + 8;
    }
    
    return yPos;
}

async function printAllRecords() {
    if (filteredRecords.length === 0) {
        alert('No records available to print!');
        return;
    }

    const confirmed = confirm(`Generate PDF for ${filteredRecords.length} filtered/sorted records? This may take a while.`);
    if (!confirmed) return;

    showLoader(true);
    showStatus(`🖨️ Generating PDF for ${filteredRecords.length} records...`, 'info');

    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait');

        // ========== PAGE 1: SUMMARY PAGE ==========
        await addPDFHeader(doc, 'Complete Assessment Reports');
        
        let yPos = 50;
        
        // Add filter info
        yPos = addFilterInfoToPDF(doc, yPos);
        
        yPos += 5; // Add some spacing
        
        // Overall Statistics Section
        doc.setFontSize(16);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Overall Statistics', 14, yPos);
        
        yPos += 12;
        doc.setFontSize(11);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        const avgScore = (filteredRecords.reduce((s, r) => s + parseFloat(r.avgPoints || 0), 0) / filteredRecords.length).toFixed(2);
        const totalPoints = filteredRecords.reduce((s, r) => s + (r.totalPoints || 0), 0);
        
        // Create a nice stats box
        doc.setFillColor(245, 247, 250);
        doc.roundedRect(14, yPos, 182, 50, 3, 3, 'F');
        
        yPos += 12;
        doc.setFontSize(12);
        doc.setFont(undefined, 'bold');
        doc.text('Total Students:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(String(filteredRecords.length), 80, yPos);
        
        yPos += 12;
        doc.setFont(undefined, 'bold');
        doc.text('Average Score:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(`${avgScore} points`, 80, yPos);
        
        yPos += 12;
        doc.setFont(undefined, 'bold');
        doc.text('Total Points:', 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(String(totalPoints), 80, yPos);
        
        yPos += 20;
        
        // Additional summary statistics
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Distribution Summary', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        // Calculate gender distribution - FIXED
        const maleCount = filteredRecords.filter(r => {
            const gender = (r.gender || '').toLowerCase();
            return gender === 'male' || gender === 'm';
        }).length;
        
        const femaleCount = filteredRecords.filter(r => {
            const gender = (r.gender || '').toLowerCase();
            return gender === 'female' || gender === 'f';
        }).length;
        
        doc.text(`Male Students: ${maleCount}`, 20, yPos);
        yPos += 6;
        doc.text(`Female Students: ${femaleCount}`, 20, yPos);
        yPos += 10;
        
        // Calculate score ranges
        const scores = filteredRecords.map(r => parseFloat(r.avgPoints || 0));
        const highestScore = Math.max(...scores).toFixed(2);
        const lowestScore = Math.min(...scores).toFixed(2);
        
        doc.text(`Highest Average Score: ${highestScore} points`, 20, yPos);
        yPos += 6;
        doc.text(`Lowest Average Score: ${lowestScore} points`, 20, yPos);
        yPos += 10;
        
        // Centre distribution
        const centres = {};
        filteredRecords.forEach(r => {
            const centre = r.centreName || 'Unknown';
            centres[centre] = (centres[centre] || 0) + 1;
        });
        
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Students by Centre', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        Object.entries(centres)
            .sort((a, b) => b[1] - a[1])
            .forEach(([centre, count]) => {
                doc.text(`${centre}: ${count} student${count > 1 ? 's' : ''}`, 20, yPos);
                yPos += 6;
            });
        
        yPos += 5;
        
        // Top 5 performers
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(41, 128, 185);
        doc.text('Top 5 Performers', 14, yPos);
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.setTextColor(0, 0, 0);
        
        const topPerformers = [...filteredRecords]
            .sort((a, b) => (b.avgPoints || 0) - (a.avgPoints || 0))
            .slice(0, 5);
        
        topPerformers.forEach((record, index) => {
            doc.setFont(undefined, 'bold');
            doc.text(`${index + 1}.`, 20, yPos);
            doc.setFont(undefined, 'normal');
           const avgPerf = getAvgPerformance(record);
doc.text(`${record.fullName} - ${avgPerf} points...`, 28, yPos);
            yPos += 6;
        });

        // ========== PAGE 2 onwards: INDIVIDUAL RECORDS ==========
        for (let i = 0; i < filteredRecords.length; i++) {
            const record = filteredRecords[i];
            
            // Add new page for each record
            doc.addPage();
            await addPDFHeader(doc, 'Complete Assessment Reports');
            yPos = 45;

            yPos = addStudentInfoSection(doc, record, yPos);
            yPos = addSubjectsTable(doc, record, yPos);
            yPos = addPathwaysSection(doc, record, yPos);
            yPos = addSummaryStats(doc, record, yPos);
        }

        // Add page numbers to all pages
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            addPDFFooter(doc, i, totalPages);
        }

        doc.save(`Filtered_Assessment_Reports_${new Date().toISOString().split('T')[0]}.pdf`);
        
        showStatus('✅ PDF generated successfully!', 'success');
    } catch (error) {
        console.error(error);
        showStatus('❌ Error generating PDF: ' + error.message, 'error');
    } finally {
        showLoader(false);
    }
}


// Helper Functions for PDF Generation

async function addPDFHeader(doc, subtitle = 'KPSEA- Student Assessment Report') {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(0, 0, pageWidth, 35, 'F');
    
    try {
        const logoImg = new Image();
        logoImg.src = '../images/logo.png';
        logoImg.crossOrigin = 'anonymous';
        
        await new Promise((resolve) => {
            logoImg.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = logoImg.width;
                canvas.height = logoImg.height;
                ctx.drawImage(logoImg, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] > 0) {
                        data[i] = 255;
                        data[i + 1] = 255;
                        data[i + 2] = 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                doc.addImage(canvas.toDataURL(), 'PNG', 14, 7.5, 20, 20);
                resolve();
            };
            logoImg.onerror = () => resolve();
        });
    } catch (e) {
        console.log('Logo not available');
    }
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont(undefined, 'bold');
    doc.text('KANYADET PRIMARY & JUNIOR SCHOOL', pageWidth / 2, 15, { align: 'center' });
    
    doc.setFontSize(14);
    doc.text(subtitle, pageWidth / 2, 22, { align: 'center' });
    
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text('P.O. Box 45 - 40139 AKALA, Siaya, Kenya', pageWidth / 2, 29, { align: 'center' });
    
    doc.setDrawColor(41, 128, 185);
    doc.setLineWidth(0.5);
    doc.line(0, 35, pageWidth, 35);
}

function addPDFFooter(doc, pageNum, totalPages) {
    const pageWidth = doc.internal.pageSize.width;
    const pageHeight = doc.internal.pageSize.height;
    const footerY = pageHeight - 15;
    
    doc.setFillColor(245, 245, 245);
    doc.rect(0, footerY - 5, pageWidth, 20, 'F');
    
    doc.setDrawColor(41, 128, 185);
    doc.setLineWidth(0.3);
    doc.line(0, footerY - 5, pageWidth, footerY - 5);
    
    doc.setTextColor(60, 60, 60);
    doc.setFontSize(8);
    doc.setFont(undefined, 'bold');
    doc.text('Generated by:', 14, footerY);
    doc.setFont(undefined, 'normal');
    doc.text('Automated School System', 14, footerY + 4);
    
    doc.setFontSize(9);
    const pageText = `Page ${pageNum} of ${totalPages}`;
    doc.text(pageText, pageWidth / 2, footerY + 2, { align: 'center' });
    
    doc.setFontSize(7);
    doc.text(`Generated: ${new Date().toLocaleDateString()}`, pageWidth - 14, footerY + 2, { align: 'right' });
}

function addStudentInfoSection(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('STUDENT INFORMATION', 16, yPos + 5.5);
    
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    
    // Calculate avg performance
    const performanceMap = {
        'Exceeding Expectation': 4,
        'Meeting Expectation': 3,
        'Approaching Expectation': 2,
        'Below Expectation': 1
    };
    
    let totalScore = 0;
    let totalSubjects = 0;
    
    record.papers?.forEach(p => {
        p.performanceLevels?.forEach(level => {
            totalScore += performanceMap[level] || 0;
            totalSubjects++;
        });
    });
    
    const avgPerformance = totalSubjects > 0 ? (totalScore / totalSubjects).toFixed(2) : 0;
    
    const infoData = [
        ['Full Name:', record.fullName || 'N/A', 'Gender:', record.gender || 'N/A'],
        ['Assessment No:', record.assessmentNumber || 'N/A', 'Exam Year:', record.examYear || 'N/A'],
        ['Centre Code:', record.centreCode || 'N/A', 'Centre Name:', record.centreName || 'N/A'],
        ['Total Papers:', String(record.papers?.length || 0), 'Avg Performance:', String(avgPerformance)]
    ];
    
    infoData.forEach(row => {
        doc.setFont(undefined, 'bold');
        doc.text(row[0], 16, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(row[1], 50, yPos);
        
        doc.setFont(undefined, 'bold');
        doc.text(row[2], 110, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(row[3], 145, yPos);
        
        yPos += 6;
    });

    return yPos + 5;
}
function addSubjectsTable(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('PAPERS & SUBJECTS PERFORMANCE', 16, yPos + 5.5);
    
    yPos += 12;

    const papersData = (record.papers || []).map(p => [
        p.paperCode || '-',
        p.paperName || '-',
        (p.subjects || []).join('\n'),
        (p.performanceLevels || []).join('\n')
    ]);

    doc.autoTable({
        head: [['Paper Code', 'Paper Name', 'Subject(s)', 'Performance Level(s)']],
        body: papersData.length > 0 ? papersData : [['No papers data available', '', '', '']],
        startY: yPos,
        styles: { 
            fontSize: 8,
            cellPadding: 3,
            overflow: 'linebreak'
        },
        headStyles: { 
            fillColor: [41, 128, 185],
            textColor: [255, 255, 255],
            fontStyle: 'bold'
        },
        columnStyles: {
            0: { cellWidth: 25 },
            1: { cellWidth: 50 },
            2: { cellWidth: 55 },
            3: { cellWidth: 52 }
        },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        margin: { left: 14, right: 14 }
    });

    return doc.lastAutoTable.finalY + 10;
}
function addPathwaysSection(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    // Check if record has the old pathways format
    if (!record.pathways || Object.keys(record.pathways).length === 0) {
        // Skip pathways section for new format
        return yPos;
    }
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('CAREER PATHWAYS', 16, yPos + 5.5);
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);

    const pathwaysData = Object.entries(record.pathways || {})
        .sort((a, b) => b[1] - a[1])
        .map(([pathway, score]) => [pathway, String(score)]);

    doc.autoTable({
        head: [['Pathway', 'Score']],
        body: pathwaysData,
        startY: yPos,
        styles: { 
            fontSize: 9,
            cellPadding: 3
        },
        headStyles: { 
            fillColor: [41, 128, 185],
            textColor: [255, 255, 255],
            fontStyle: 'bold'
        },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        margin: { left: 14, right: 14 },
        columnStyles: {
            0: { cellWidth: 140 },
            1: { cellWidth: 40, halign: 'center' }
        }
    });
    return doc.lastAutoTable.finalY + 10;
}
function addSummaryStats(doc, record, yPos) {
    const pageWidth = doc.internal.pageSize.width;
    
    if (yPos > 240) {
        doc.addPage();
        yPos = 20;
    }
    
    doc.setFillColor(41, 128, 185);
    doc.rect(14, yPos, pageWidth - 28, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text('PERFORMANCE SUMMARY', 16, yPos + 5.5);
    
    yPos += 12;
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    
    const paperCount = (record.papers || []).length;
    
    // Get top performing subjects across all papers
    const allSubjects = [];
    record.papers?.forEach(paper => {
        paper.subjects?.forEach((subject, index) => {
            const performanceLevel = paper.performanceLevels?.[index] || 'Unknown';
            const performanceMap = {
                'Exceeding Expectation': 4,
                'Meeting Expectation': 3,
                'Approaching Expectation': 2,
                'Below Expectation': 1
            };
            const score = performanceMap[performanceLevel] || 0;
            allSubjects.push({ name: subject, performanceLevel, score });
        });
    });
    
    const topSubjects = allSubjects
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    
    doc.setFont(undefined, 'bold');
    doc.text('Total Papers Taken:', 16, yPos);
    doc.setFont(undefined, 'normal');
    doc.text(String(paperCount), 65, yPos);
    
    yPos += 8;
    doc.setFont(undefined, 'bold');
    doc.text('Top 3 Subjects:', 16, yPos);
    yPos += 6;
    
    doc.setFont(undefined, 'normal');
    if (topSubjects.length > 0) {
        topSubjects.forEach((subject, index) => {
            doc.text(`${index + 1}. ${subject.name} (${subject.performanceLevel})`, 20, yPos);
            yPos += 5;
        });
    } else {
        doc.text('No subjects available', 20, yPos);
        yPos += 5;
    }
    
    yPos += 5;
    const timestamp = record.timestamp ? new Date(record.timestamp).toLocaleString() : 'N/A';
    doc.setFontSize(8);
    doc.setTextColor(100, 100, 100);
    doc.text(`Report generated on: ${timestamp}`, 16, yPos);
    
    return yPos + 10;
}
