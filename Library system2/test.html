<!-- Lost Books Modal -->
<div id="lostBooksOverviewModal" class="modal">
    <div class="modal-content large-modal">
        <div class="modal-header">
            <h2><i class="bi bi-exclamation-triangle text-warning"></i> Lost Books Overview</h2>
            <button class="close-btn" onclick="document.getElementById('lostBooksOverviewModal').classList.remove('active')">&times;</button>
        </div>
        
        <div class="modal-body">
            <!-- Filter Controls -->
            <div class="filter-controls mb-3">
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" 
                               id="lostBooksSearch" 
                               class="form-control" 
                               placeholder="Search by student name, assessment no, grade, or book title...">
                    </div>
                    <div class="col-md-4">
                        <select id="lostBooksFilter" class="form-control">
                            <option value="all">All Records</option>
                            <optgroup label="Sort by:">
                                <option value="grade">Grade</option>
                                <option value="student">Student Name</option>
                                <option value="book">Book Title</option>
                                <option value="issueDate">Issue Date (Recent First)</option>
                                <option value="lostDate">Lost Date (Recent First)</option>
                            </optgroup>
                            <optgroup label="Filter by Status:">
                                <option value="pending">Pending Recovery</option>
                                <option value="recovered">Recovered</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <div id="lostBooksTotalCount" class="text-muted mt-2 font-weight-bold">
                            Total: 0 lost books
                        </div>
                    </div>
                </div>
            </div>

            <!-- Lost Books Table -->
            <div class="table-responsive">
                <table class="table table-bordered table-striped">
                    <thead class="thead-dark">
                        <tr>
                            <th>#</th>
                            <th>Grade</th>
                            <th>Student Name</th>
                            <th>Assessment No</th>
                            <th>Book Title</th>
                            <th>Issue Date</th>
                            <th>Lost Date</th>
                            <th>Recovery Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="lostBooksTableBody">
                        <tr>
                            <td colspan="9" class="text-center">Click "Show Lost Books" to load data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
.filter-controls {
    background-color: #f8f9fa;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.filter-controls .form-control {
    border-radius: 6px;
    border: 1px solid #ced4da;
}

.filter-controls select {
    background-color: white;
}

#lostBooksTotalCount {
    font-size: 14px;
    color: #6c757d;
    text-align: center;
    line-height: 38px; /* Align with form controls */
}

.table th:first-child {
    width: 50px;
    text-align: center;
}

.table td:first-child {
    text-align: center;
    background-color: #f8f9fa;
}

.large-modal {
    max-width: 1200px;
    width: 95%;
}

.btn-group {
    display: flex;
    gap: 5px;
}

.btn-group .btn {
    white-space: nowrap;
}
</style>
