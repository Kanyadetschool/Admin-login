<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results Portal</title>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="./css/students.css"

    <!-- jsPDF & AutoTable for Enhanced PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="./imgs/logo.png" alt="Logo" class="logo">
            <h1>KJSEA Individual Student Results Portal</h1>
            <p>Check Your Assessment Results</p>
        </div>

        <div class="search-section">
            <h2>🔍 Enter Your Name</h2>
            <div class="search-box">
                <input type="text" id="studentNameInput" class="search-input" placeholder="Full name... eg Maggy" onkeypress="handleEnter(event)">
                <button class="search-btn" onclick="searchStudent()">Search</button>
            </div>
            <p style="font-size: 13px;">Enter name exactly as on assessment or part of your name</p>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="color: white; font-size: 16px;">Searching...</p>
    </div>

    <div id="successNotification">
        <div class="notification-content">
            <div class="checkmark">✓</div>
            <div class="success-text">Results Found!</div>
            <div class="fire-celebration">🔥🎉</div>
        </div>
    </div>

    <!-- Custom Toast Notification -->
    <div id="customNotification">
        <span class="icon">⚠️</span>
        <span id="notificationMessage">Message</span>
    </div>

    <!-- Selection Modal -->
    <div id="selectionModal">
        <div class="modal-overlay" onclick="closeSelectionModal()"></div>
        <div class="modal-content">
            <button class="close-btn" onclick="closeSelectionModal()">×</button>
            <h2 style="text-align:center; color:#2c3e50; margin:20px 0;">Multiple Students Found</h2>
            <p style="text-align:center; color:#666; margin-bottom:30px;">Please select the correct student:</p>
            <ul class="selection-list" id="selectionList"></ul>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="resultsModal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div class="result-card" id="resultCard"></div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyA_41WpdMjHJOU5s3gQ9aieIayZRvUoRLE",
            authDomain: "kanyadet-school-admin.firebaseapp.com",
            databaseURL: "https://kanyadet-school-admin-default-rtdb.firebaseio.com",
            projectId: "kanyadet-school-admin",
            storageBucket: "kanyadet-school-admin.firebasestorage.app",
            messagingSenderId: "409708360032",
            appId: "1:409708360032:web:a21d63e8cb5fa1ecabee05",
            measurementId: "G-Y4C0ZRRL52"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allRecords = [];
        let dataTable = null;
        let currentStudentData = null;

        // Toast Notification
        function showNotification(message, type = 'error') {
            const notif = document.getElementById('customNotification');
            const msgEl = document.getElementById('notificationMessage');
            const icon = notif.querySelector('.icon');

            msgEl.textContent = message;
            notif.className = type === 'success' ? 'success' : '';
            icon.textContent = type === 'success' ? '✓' : '⚠️';

            notif.style.display = 'flex';

            setTimeout(() => {
                notif.style.animation = 'fadeOut 0.5s ease forwards';
                setTimeout(() => {
                    notif.style.display = 'none';
                    notif.style.animation = 'slideUp 0.5s ease';
                }, 500);
            }, 4000);
        }

        // Real-time Listeners
        function startRealTimeListeners() {
            const assessmentsRef = db.ref('adminPortal/assessments');

            assessmentsRef.on('child_added', (snapshot) => {
                const data = snapshot.val();
                if (data && data.fullName) {
                    if (!allRecords.find(r => r.assessmentNumber === data.assessmentNumber)) {
                        allRecords.push(data);
                    }
                }
            });

            assessmentsRef.on('child_changed', (snapshot) => {
                const updatedData = snapshot.val();
                if (updatedData) {
                    const index = allRecords.findIndex(r => r.assessmentNumber === updatedData.assessmentNumber);
                    if (index !== -1) allRecords[index] = updatedData;
                    else allRecords.push(updatedData);
                }
            });

            assessmentsRef.on('child_removed', (snapshot) => {
                const removedData = snapshot.val();
                if (removedData) {
                    allRecords = allRecords.filter(r => r.assessmentNumber !== removedData.assessmentNumber);
                }
            });
        }

        function handleEnter(event) {
            if (event.key === 'Enter') searchStudent();
        }

        function searchStudent() {
            const name = document.getElementById('studentNameInput').value.trim().toLowerCase();
            if (!name) {
                showNotification('Please enter a name to search', 'error');
                return;
            }

            document.getElementById('loader').style.display = 'flex';

            setTimeout(() => {
                const matches = allRecords.filter(record =>
                    record.fullName && record.fullName.toLowerCase().includes(name)
                );

                document.getElementById('loader').style.display = 'none';

                if (matches.length === 0) {
                    showNotification('No results found – please check the name and try again', 'error');
                    document.getElementById('studentNameInput').value = '';
                    document.getElementById('studentNameInput').focus();
                } else if (matches.length === 1) {
                    document.getElementById('successNotification').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('successNotification').style.display = 'none';
                        currentStudentData = matches[0];
                        displayResultsInModal(matches[0]);
                    }, 1800);
                } else {
                    showSelectionModal(matches);
                }
            }, 300);
        }

        function showSelectionModal(matches) {
            const list = document.getElementById('selectionList');
            list.innerHTML = '';

            matches.forEach((student) => {
                const li = document.createElement('li');
                li.className = 'selection-item';
                li.onclick = () => {
                    document.getElementById('selectionModal').style.display = 'none';
                    document.getElementById('successNotification').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('successNotification').style.display = 'none';
                        currentStudentData = student;
                        displayResultsInModal(student);
                    }, 1200);
                };

                li.innerHTML = `
                    <div class="selection-name">${student.fullName}</div>
                    <div class="selection-details">
                        <strong>Assessment No:</strong> ${student.assessmentNumber || 'N/A'}<br>
                        <strong>Year:</strong> ${student.examYear || 'N/A'}<br>
                        <strong>Centre:</strong> ${student.centreName || 'N/A'} (${student.centreCode || 'N/A'})
                    </div>
                `;
                list.appendChild(li);
            });

            document.getElementById('selectionModal').style.display = 'flex';
        }

        function closeSelectionModal() {
            document.getElementById('selectionModal').style.display = 'none';
            document.getElementById('studentNameInput').focus();
        }

        // Enhanced Premium PDF Export with Examination Year
        async function exportToPdfEnhanced() {
            if (!currentStudentData) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            const student = currentStudentData;
            const fullName = student.fullName || "Student";
            const examYear = student.examYear || "N/A";
            const date = new Date().toLocaleDateString();

            // Load logo
            const logoImg = new Image();
            logoImg.src = './img/logo.png';
            logoImg.crossOrigin = 'anonymous';

            await new Promise(resolve => {
                logoImg.onload = resolve;
                logoImg.onerror = () => resolve();
            });

            // Header Background
            doc.setFillColor(41, 128, 185);
            doc.rect(0, 0, 210, 40, 'F');

            // Logo
            if (logoImg.complete) {
                doc.addImage(logoImg, 'PNG', 15, 8, 25, 25);
            }

            // School Title
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont(undefined, 'bold');
            doc.text('KANYADET PRI & JUNIOR SCHOOL', 50, 20);

            doc.setFontSize(14);
            doc.text('Kenya Junior School Education Assessment', 50, 28);

            // Right Side Info
            doc.setFontSize(11);
            doc.text(`Examination Year: ${examYear}`, 140, 15);
            doc.text(`Date Printed: ${date}`, 140, 22);
            doc.text(`Assessment No: ${student.assessmentNumber || 'N/A'}`, 140, 29);

            // Student Details Section
            doc.setTextColor(0);
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text(`Student Name: ${fullName}`, 20, 55);

            doc.setFontSize(12);
            doc.setFont(undefined, 'normal');
            doc.text(`Gender: ${student.gender || 'N/A'}`, 20, 65);
            doc.text(`Centre: ${student.centreName || 'N/A'} (${student.centreCode || 'N/A'})`, 20, 72);
            doc.text(`Examination Year: ${examYear}`, 20, 79);

            // Subjects Table
            const subjectRows = (student.subjects || []).map(s => [
                s.code,
                s.name,
                s.performanceLevel || '-',
                s.points,
                s.description || '-'
            ]);

            doc.autoTable({
                head: [['Code', 'Subject', 'Performance Level', 'Points', 'Description']],
                body: subjectRows,
                startY: 90,
                styles: { fontSize: 10, cellPadding: 4 },
                headStyles: { fillColor: [41, 128, 185], textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [245, 248, 250] },
                columnStyles: { 3: { halign: 'center' } }
            });

            // Pathway Scores
            let finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text('Pathway Scores', 20, finalY);

            const pathways = Object.entries(student.pathways || {})
                .sort((a, b) => b[1] - a[1]);

            let x = 20;
            let rowCount = 0;
            pathways.forEach(([pathway, score]) => {
                if (rowCount % 3 === 0 && rowCount !== 0) {
                    finalY += 35;
                    x = 20;
                }

                doc.setFillColor(248, 249, 250);
                doc.roundedRect(x, finalY + 5, 55, 30, 5, 5, 'F');

                doc.setFontSize(11);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text(pathway, x + 27.5, finalY + 15, { align: 'center' });

                doc.setFontSize(22);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(52, 152, 219);
                doc.text(String(score), x + 27.5, finalY + 28, { align: 'center' });

                doc.setTextColor(0);
                x += 65;
                rowCount++;
            });

            // Footer with Signatures
            const footerY = 270;
            doc.setFontSize(10);
            doc.text('Prepared by:', 30, footerY);
            doc.text('___________________________', 30, footerY + 8);
            doc.text('Signature & Date', 30, footerY + 14);

            doc.text('Verified by:', 120, footerY);
            doc.text('___________________________', 120, footerY + 8);
            doc.text('Headteacher Signature & Stamp', 120, footerY + 14);

            // Save PDF
            doc.save(`${fullName.replace(/[^a-zA-Z0-9]/g, '_')}_KJSEA_${examYear}_Results.pdf`);
            showNotification('Premium PDF with Examination Year exported!', 'success');
        }

        function displayResultsInModal(data) {
            currentStudentData = data;

            const fullName = data.fullName || "Student";
            const examYear = data.examYear || "N/A";
            const cleanName = fullName.toUpperCase().replace(/[^A-Z0-9]/g, '');
            const personalPhoto = `./img/students/${cleanName}.jpg`;
            const defaultPhoto = `./img/default.png`;
            const initials = fullName.trim().split(" ").map(part => part[0]).join("").substring(0, 2).toUpperCase() || "ST";

            document.getElementById('resultsModal').style.display = 'flex';
            document.getElementById('resultCard').innerHTML = `
                <div class="student-header">
                    <div class="student-avatar-container">
                        <img src="${personalPhoto}" class="student-avatar" alt="Student Photo"
                             onerror="this.onerror=null; this.src='${defaultPhoto}';">
                        <img src="${defaultPhoto}" class="student-avatar" alt="Default Photo" style="display:none;"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="avatar-fallback" style="display:none;">${initials}</div>
                    </div>
                    <div class="student-details">
                        <h2 class="student-name">${fullName}</h2>
                        <div class="student-info-text">
                            <strong>Assessment No:</strong> ${data.assessmentNumber || 'N/A'}<br>
                            <strong>Examination Year:</strong> <strong style="color:#e74c3c;">${examYear}</strong><br>
                            <strong>Gender:</strong> ${data.gender || 'N/A'}<br>
                            <strong>Centre:</strong> ${data.centreName || 'N/A'} (${data.centreCode || 'N/A'})
                        </div>
                    </div>
                </div>

                <div class="section-header">Subject Performance</div>
                <table id="subjectsTable" class="display responsive nowrap" style="width:100%">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Subject</th>
                            <th>Level</th>
                            <th>Points</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.subjects?.map(s => `
                            <tr>
                                <td><strong>${s.code}</strong></td>
                                <td>${s.name}</td>
                                <td>${s.performanceLevel}</td>
                                <td><span class="points-badge">${s.points}</span></td>
                                <td>${s.description}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="5">No subjects available</td></tr>'}
                    </tbody>
                </table>

                <div class="section-header">Pathway Scores</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin: 20px 0;">
                    ${Object.entries(data.pathways || {})
                        .sort((a, b) => b[1] - a[1])
                        .map(([pathway, score]) => `
                        <div style="background: #f8f9fa; padding: 18px; border-radius: 10px; text-align: center; border: 1px solid #ddd;">
                            <div style="font-size: 16px; color: #2c3e50;">${pathway}</div>
                            <div style="font-size: 28px; font-weight: bold; color: #3498db;">${score}</div>
                        </div>
                    `).join('') || '<div style="grid-column: 1/-1; text-align:center; color:#999; padding:20px;">No pathway data available</div>'}
                </div>

                <div class="action-buttons" style="margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Print Results</button>
                    <button class="btn btn-secondary" onclick="exportToPdfEnhanced()">📄 Premium PDF (with Year)</button>
                    <button class="btn btn-primary" onclick="closeModal()">🔍 Search Another</button>
                </div>
            `;

            $(document).ready(function() {
                if (dataTable) dataTable.destroy();
                dataTable = $('#subjectsTable').DataTable({
                    responsive: true,
                    pageLength: 10,
                    lengthMenu: [5, 10, 15, 20],
                    order: [[3, 'desc']],
                    language: { search: "Filter subjects:", lengthMenu: "_MENU_" }
                });
            });
        }

        function closeModal() {
            document.getElementById('resultsModal').style.display = 'none';
            if (dataTable) {
                dataTable.destroy();
                dataTable = null;
            }
            document.getElementById('studentNameInput').value = '';
            document.getElementById('studentNameInput').focus();
        }

        // Start real-time loading
        startRealTimeListeners();
    </script>

    <style>
        /* Toast Notification */
        #customNotification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-size: 18px;
            font-weight: 600;
            z-index: 10000;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.5s ease;
            max-width: 90%;
            text-align: center;
        }

        #customNotification.success {
            background: #27ae60;
        }

        #customNotification .icon {
            font-size: 24px;
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; bottom: -100px; }
        }
    </style>
</body>
</html>
