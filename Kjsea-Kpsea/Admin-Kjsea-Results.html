        let allRecords = [];
        let filteredRecords = [];

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
            setTimeout(() => statusEl.style.display = 'none', 5000);
        }

        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
function parseRawData(rawText) {
    const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
    const data = {
        assessmentNumber: '',
        fullName: '',
        gender: '',
        centreCode: '',
        centreName: '',
        examYear: document.getElementById('examYear').value.trim() || new Date().getFullYear().toString(),
        subjects: [],
        pathways: {}
    };

    let isSubjectSection = false;
    let isPathwaySection = false;

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.startsWith('Assessment Number:')) data.assessmentNumber = line.split(':')[1].trim();
        else if (line.startsWith('Full Name:')) data.fullName = line.split(':')[1].trim();
        else if (line.startsWith('Gender:')) data.gender = line.split(':')[1].trim();
        else if (line.startsWith('Centre Code:')) data.centreCode = line.split(':')[1].trim();
        else if (line.startsWith('Centre Name:')) data.centreName = line.split(':')[1].trim();
        else if (line.includes('Subject Code') && line.includes('Subject Name')) { 
            isSubjectSection = true; 
            continue; 
        }
        else if (line === 'Pathways') { 
            isSubjectSection = false; 
            isPathwaySection = true; 
            continue; 
        }
        else if (line.includes('©')) break;

        if (isSubjectSection && !isPathwaySection) {
            let parts = line.split('\t').filter(p => p.trim());
            if (parts.length < 4) parts = line.split(/\s{2,}/).filter(p => p.trim());
            if (parts.length < 4 && /\d/.test(line)) parts = line.split(/\s+/).filter(p => p.trim());

            if (parts.length >= 4) {
                let pointsIndex = -1;
                for (let j = 0; j < parts.length; j++) {
                    const val = parseInt(parts[j]);
                    if (!isNaN(val) && val >= 0 && val <= 12) { pointsIndex = j; break; }
                }
                if (pointsIndex > 0) {
                    const code = parts[0];
                    const name = parts.slice(1, pointsIndex - 1).join(' ');
                    const performanceLevel = parts[pointsIndex - 1] || '';
                    const points = parseInt(parts[pointsIndex]);
                    const description = parts.slice(pointsIndex + 1).join(' ');
                    data.subjects.push({ code, name, performanceLevel, points, description });
                }
            }
        }

        if (isPathwaySection) {
            // Check if this line contains multiple pathways (all on one line)
            const tabParts = line.split('\t').filter(p => p.trim());
            const pathwaysOnLine = tabParts.filter(p => p.includes('Pathway'));
            
            if (pathwaysOnLine.length > 1) {
                // Format 2: All pathways on one line, all scores on next line
                const scoresLine = lines[i + 1];
                if (scoresLine) {
                    const scores = scoresLine.split('\t')
                        .map(s => s.trim())
                        .filter(s => s && !isNaN(parseFloat(s)))
                        .map(s => parseFloat(s));
                    
                    // Match pathways with scores
                    pathwaysOnLine.forEach((pathway, idx) => {
                        if (scores[idx] !== undefined) {
                            data.pathways[pathway.trim()] = scores[idx];
                        }
                    });
                    i++; // Skip the scores line since we processed it
                }
                break; // Exit pathway section after processing
            } 
            else if (line.includes('Pathway')) {
                // Format 1: One pathway per line, score on next line
                const pathwayName = line.trim();
                const scoreLine = lines[i + 1];
                
                if (scoreLine && !isNaN(parseFloat(scoreLine.trim()))) {
                    data.pathways[pathwayName] = parseFloat(scoreLine.trim());
                    i++; // Skip the score line
                }
            }
        }
    }

    data.timestamp = new Date().toISOString();
    data.totalPoints = data.subjects.reduce((sum, s) => sum + (s.points || 0), 0);
    data.avgPoints = data.subjects.length > 0 ? (data.totalPoints / data.subjects.length).toFixed(2) : 0;

    return data;
}
        async function parseAndSave() {
            const rawData = document.getElementById('rawData').value.trim();
            if (!rawData) {
                showStatus('❌ Please paste assessment data first!', 'error');
                return;
            }

            try {
                showLoader(true);
                showStatus('🔄 Parsing data...', 'info');
                const parsedData = parseRawData(rawData);

                if (!parsedData.assessmentNumber) {
                    showStatus('❌ Invalid data format.', 'error');
                    showLoader(false);
                    return;
                }

                showStatus('💾 Saving to database...', 'info');
                await db.ref('adminPortal/assessments/' + parsedData.assessmentNumber).set(parsedData);

                showStatus('✅ Record saved successfully!', 'success');
                document.getElementById('rawData').value = '';
                showLoader(false);
            } catch (error) {
                console.error(error);
                showStatus('❌ Error: ' + error.message, 'error');
                showLoader(false);
            }
        }

        async function deleteRecord(assessmentNumber) {
            if (!confirm(`Delete record ${assessmentNumber}? This cannot be undone.`)) return;

            try {
                showLoader(true);
                await db.ref('adminPortal/assessments/' + assessmentNumber).remove();
                showStatus('🗑️ Record deleted!', 'success');
                showLoader(false);
            } catch (error) {
                showStatus('❌ Delete failed: ' + error.message, 'error');
                showLoader(false);
            }
        }

        function createRecordCard(data) {
            const card = document.createElement('div');
            card.className = 'record-card';
            card.innerHTML = `
                <div class="record-header">
                    <div class="record-title">${data.fullName || 'N/A'}</div>
                    <div class="record-badge">${data.gender || 'N/A'}</div>
                <button class="btn-delete" onclick="deleteRecord('${data.assessmentNumber}')">🗑️ Delete Record</button>

                </div>

                <div class="info-grid">
                    <div class="info-item"><div class="info-label">Assessment Number</div><div class="info-value">${data.assessmentNumber || 'N/A'}</div></div>
                    <div class="info-item"><div class="info-label">Examination Year</div><div class="info-value">${data.examYear || 'N/A'}</div></div>
                    <div class="info-item"><div class="info-label">Centre Code</div><div class="info-value">${data.centreCode || 'N/A'}</div></div>
                    <div class="info-item"><div class="info-label">Centre Name</div><div class="info-value">${data.centreName || 'N/A'}</div></div>
                    <div class="info-item"><div class="info-label">Saved On</div><div class="info-value">${formatDate(data.timestamp)}</div></div>
                    <div class="info-item"><div class="info-label">Total Points</div><div class="info-value">${data.totalPoints || 0}</div></div>
                    <div class="info-item"><div class="info-label">Average Points</div><div class="info-value">${data.avgPoints || 0}</div></div>
                </div>


                <h3 style="margin: 25px 0 15px; color: #2c3e50; font-size: 18px;">📚 Subjects</h3>
                <table class="subjects-table">
                    <thead><tr><th>Code</th><th>Subject</th><th>Performance</th><th>Points</th><th>Description</th></tr></thead>
                    <tbody>
                        ${data.subjects?.map(s => `<tr><td>${s.code}</td><td><strong>${s.name}</strong></td><td>${s.performanceLevel}</td><td><strong>${s.points}</strong></td><td>${s.description}</td></tr>`).join('') || 
                        '<tr><td colspan="5" style="text-align:center; color:#95a5a6;">No subjects</td></tr>'}
                    </tbody>
                </table>

                <h3 style="margin: 25px 0 15px; color: #2c3e50; font-size: 18px;">🎯 Pathways</h3>
                <div class="pathways-grid">
                    ${Object.entries(data.pathways || {}).sort((a,b) => b[1]-a[1]).map(([p,s]) => 
                        `<div class="pathway-card"><div class="pathway-name">${p}</div><div class="pathway-score">${s}</div></div>`
                    ).join('') || '<div style="grid-column:1/-1; text-align:center; color:#95a5a6;">No pathway data</div>'}
                </div>
            `;
            return card;
        }

        function displayRecords(records) {
            const container = document.getElementById('recordsContent');
            container.innerHTML = records.length === 0 
                ? '<div class="no-data">🔍 No matching records found.</div>'
                : '';
            records.forEach(r => container.appendChild(createRecordCard(r)));
        }

        function refreshDisplay() {
            filteredRecords = [...allRecords];
            populateCentreFilter();
            performSearch(); // applies current search + filters + sort
            updateStats();
            updateSummary();
        }

        function loadSavedRecords() {
            const container = document.getElementById('recordsContent');
            container.innerHTML = '<div class="loading">⏳ Loading records...</div>';

            allRecords = [];
            const ref = db.ref('adminPortal/assessments');

            ref.on('child_added', snap => {
                const data = snap.val();
                if (data && !allRecords.find(r => r.assessmentNumber === data.assessmentNumber)) {
                    allRecords.push(data);
                    refreshDisplay();
                }
            });

            ref.on('child_changed', snap => {
                const data = snap.val();
                if (data) {
                    const i = allRecords.findIndex(r => r.assessmentNumber === data.assessmentNumber);
                    if (i !== -1) allRecords[i] = data;
                    else allRecords.push(data);
                    refreshDisplay();
                }
            });

            ref.on('child_removed', snap => {
                const data = snap.val();
                if (data) {
                    allRecords = allRecords.filter(r => r.assessmentNumber !== data.assessmentNumber);
                    refreshDisplay();
                }
            });
        }

        function populateCentreFilter() {
            const centres = [...new Set(allRecords.map(r => r.centreName).filter(Boolean))].sort();
            const select = document.getElementById('filterCentre');
            select.innerHTML = '<option value="">All Centres</option>';
            centres.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredRecords = allRecords.filter(r => 
                !query || 
                (r.fullName?.toLowerCase().includes(query)) ||
                (r.assessmentNumber?.toLowerCase().includes(query)) ||
                (r.centreName?.toLowerCase().includes(query)) ||
                (r.centreCode?.toLowerCase().includes(query)) ||
                (r.examYear?.toString().includes(query))
            );
            applyFilters();
        }

        function applyFilters() {
            const gender = document.getElementById('filterGender').value;
            const centre = document.getElementById('filterCentre').value;

            filteredRecords = filteredRecords.filter(r => 
                (!gender || r.gender === gender) &&
                (!centre || r.centreName === centre)
            );

            sortRecords();
        }

        function sortRecords() {
            const by = document.getElementById('sortBy').value;
            filteredRecords.sort((a, b) => {
                switch(by) {
                    case 'newest': return new Date(b.timestamp) - new Date(a.timestamp);
                    case 'oldest': return new Date(a.timestamp) - new Date(b.timestamp);
                    case 'name-asc': return (a.fullName || '').localeCompare(b.fullName || '');
                    case 'name-desc': return (b.fullName || '').localeCompare(a.fullName || '');
                    case 'score-high': return (b.avgPoints || 0) - (a.avgPoints || 0);
                    case 'score-low': return (a.avgPoints || 0) - (b.avgPoints || 0);
                    default: return 0;
                }
            });
            displayRecords(filteredRecords);
        }

        function updateStats() {
            document.getElementById('totalRecords').textContent = allRecords.length;
            document.getElementById('totalStudents').textContent = allRecords.length;
            if (allRecords.length > 0) {
                const avg = (allRecords.reduce((s, r) => s + parseFloat(r.avgPoints || 0), 0) / allRecords.length).toFixed(1);
                document.getElementById('avgScore').textContent = avg;
            } else {
                document.getElementById('avgScore').textContent = '0';
            }
        }

        function updateSummary() {
            const el = document.getElementById('reportSummary');
            el.textContent = filteredRecords.length === allRecords.length
                ? `Showing all ${allRecords.length} records`
                : `Showing ${filteredRecords.length} of ${allRecords.length} records`;
        }

        function exportToCSV() {
            if (filteredRecords.length === 0) return alert('No records to export!');
            let csv = 'Assessment Number,Full Name,Gender,Centre Code,Centre Name,Examination Year,Total Points,Average Points,Saved On\n';
            filteredRecords.forEach(r => {
                csv += `"${r.assessmentNumber || ''}","${r.fullName || ''}","${r.gender || ''}","${r.centreCode || ''}","${r.centreName || ''}","${r.examYear || ''}",${r.totalPoints || 0},${r.avgPoints || 0},"${formatDate(r.timestamp)}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `assessment-records-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            document.getElementById('rawData').value = '';
            document.getElementById('status').style.display = 'none';
        }

        // Start real-time listening on page load
        loadSavedRecords();

        // Clean up listeners on unload (optional but good practice)
        window.addEventListener('beforeunload', () => {
            db.ref('adminPortal/assessments').off();
        });
    </script>
