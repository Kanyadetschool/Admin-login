<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Login</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+20+Charted&display=swap" rel="stylesheet">
    	 <!-- Add Firebase SDK -->
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-app-compat.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-auth-compat.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-firestore-compat.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-app-compat.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-auth-compat.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.0/firebase-firestore-compat.js"></script>
	 <script src="https://cdn.firebase.com/libs/firebaseui/2.5.1/firebaseui.js"></script>
	   <!-- Add Firebase SDK -->

</head><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<body>
    <div class="container">
        <div class="form-box">
            <div class="form-wrapper">
                <div class="form-side">

                    <div class="header" >
                        <img src="./img/logo.png" alt=""  class="logo">
                        <!-- Replace problematic SVG with simpler version -->
    
                        <h2>Admins-Portal || </h2>
                        <div id="user-display" class="user-welcome" style="display: none;"></div>
                        
                    </div>
                    <p class="form-description">Kanyadet comprehensive School</p> <br>
                    <hr>
                    <h2>Sign In</h2>
                    
                    <!-- Add separation between auth methods -->
                    <div class="auth-methods">
                  
                        <form id="loginForm" class="login-form">
                            <div class="input-group">
                                <div class="input-field">
                                    <i class="fa-solid fa-envelope"></i>
                                    <input type="email" id="email" placeholder="Email" required>
                                </div>
                                <div class="input-field">
                                    <i class="fa-solid fa-lock"></i>
                                    <input type="password" id="password" placeholder="Password" required>
                                    <i class="fa-solid fa-eye toggle-password"></i>
                                </div>
                            </div>
                            <div class="password-strength">
                                <div class="strength-bar"></div>
                                <div class="strength-label"></div>
                            </div>
                            <div class="remember-forgot">
                                <label><input type="checkbox" checked > Remember me</label>
                            </div>
                            <div class="form-footer"> 
                                
                                <button type="submit" class="submit-btn">
                                   
                                    <span>  <i class="fa-solid fa-user"></i> Login</span>
                                    <div class="spinner"></div>
                                </button>
                                
                                <div id="installButtonContainer">
                                    <button class="btn" id="installButton">  <i class="fa-solid fa-share"></i> Install App </button>
                                  </div>
                                  <div id="thankYouMessage" style="display: none;">
                                    Thank you for installing the app!
                                  </div>
                                  <button id="shareButton" style="display: none;" class="Terms">Share App</button> <!-- Share button initially hidden -->
                                
                            </div>
                            <div class="separator">
                                <span></span>
                           <div id="firebaseui-auth-container"></div>

                            </div>

                            <div class="date-container">
                                <div id="day" class="day"></div>
                                <div id="dated" class="dated"></div>
                                <div id="time" class="dated"></div>
                              </div>
                      <footer>Administrators  Portal | Kanyadet school | ICT Dep | &copy; 2025</footer> 
                            
                        
                            
                            
                            
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
    <!-- Update script loading -->
    <script src="https://admin-kanyadet.web.app/js/GoogleAuthfireBase.js"></script>
    <script src="https://admin-kanyadet.web.app/js/GoogleAuthmain.js"></script>
	<script src="https://admin-kanyadet.web.app/js/sessions.js"></script>
    
     <script src="./js/install.js" ></script>
    <script src="./js/service-worker.js"></script>
    <script  type="module" src="./js/firebaseConfig.js"></script>
    <script  type="module" src="./js/authService.js"></script>
    <script  type="module" src="./js/script.js"></script>

</body>
</html>
