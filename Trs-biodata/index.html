<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Teachers Database</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Teacher Information Management System</h1></header>

    <div class="container">
        <section id="manual-input">
            <h2>➕ Add Teacher Manually</h2>
            <form id="teacher-form">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="subject" placeholder="Subject Taught" required>
                <input type="email" id="email" placeholder="Email Address" required>
                
                <button type="button" id="add-custom-field">Add Custom Field</button>
                <div id="custom-fields-container"></div>

                <button type="submit">💾 Save Teacher</button>
            </form>
        </section>
        
        <hr>

        <section id="bulk-upload">
            <h2>📤 Bulk Upload (XLSX)</h2>
            <p>Use an Excel file with columns: Name, Subject, Email, and any custom fields.</p>
            <input type="file" id="xlsx-file" accept=".xlsx, .xls">
            <button type="button" id="upload-xlsx">Upload Teachers</button>
        </section>
        
        <hr>

        <section id="teachers-list-container">
            <h2>📚 Teacher Database (Realtime)</h2>
            
            <div id="filter-controls">
                <input type="text" id="teacher-search" placeholder="🔍 Search by Name or Subject...">
                <select id="filter-subject">
                    <option value="">Filter by Subject (All)</option>
                </select>
            </div>
            
            <table id="teachers-table">
                <thead>
                    <tr>
                        </tr>
                </thead>
                <tbody id="teachers-list">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
