<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanyadet School - Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            z-index: -2;
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        .login-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .login-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 30px;
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.5);
            animation: pulse-login 3s ease-in-out infinite;
        }

        @keyframes pulse-login {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 50px rgba(99, 102, 241, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 25px 60px rgba(236, 72, 153, 0.6); }
        }

        .login-card h2 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .google-btn {
            background: white;
            color: #333;
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .google-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .dashboard {
            display: none;
        }

        .user-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .user-info-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .user-details h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .user-details p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
        }

        .stat-number {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-section {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .alert-banner {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(22, 163, 74, 0.2));
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert-icon {
            font-size: 24px;
        }

        .alert-text {
            flex: 1;
        }

        .alert-text strong {
            font-weight: 700;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 20px 25px 20px 60px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .filter-chips {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .chip.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-color: transparent;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .welcome-box {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
        }

        .welcome-box h2 {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
        }

        .welcome-box p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .results-count {
            font-size: 18px;
            font-weight: 700;
        }

        .clear-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .student-grid {
            display: grid;
            gap: 20px;
        }

        .student-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeInCard 0.5s forwards;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--accent));
        }

        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .student-card:hover {
            transform: translateX(10px);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .student-header-row {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .student-name {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-verified {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3), rgba(22, 163, 74, 0.3));
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
        }

        .status-pending {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(245, 158, 11, 0.3));
            border: 1px solid rgba(251, 191, 36, 0.5);
            color: #fbbf24;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .detail-box:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.02);
        }

        .detail-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
            }

            .login-card {
                padding: 40px 30px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .user-header {
                flex-direction: column;
                gap: 20px;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .student-name {
                font-size: 22px;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grain"></div>

    <div class="container">
        <nav class="navbar">
            <div class="logo-section">
                <div class="logo">🎓</div>
                <div class="brand">
                    <h1>KANYADET SCHOOL</h1>
                    <p>Student Assessment Portal</p>
                </div>
            </div>
        </nav>

        <div class="login-container" id="loginSection">
            <div class="login-card">
                <div class="login-icon">🔐</div>
                <h2>Secure Access</h2>
                <p>Sign in with your Google account to access student records</p>
                <button class="google-btn" id="googleSignInBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button> <br>
                            <p class="mt-2"> Back to my Library <a href="./student-portal.html" id="forgotAssessmentNo" target="_blank">Click here</a></p>

            </div>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="user-header">
                <div class="user-info-section">
                    <img id="userAvatar" class="user-avatar" src="" alt="User">
                    <div class="user-details">
                        <h3 id="userName"></h3>
                        <p id="userEmail"></p>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">Sign Out</button>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="search-section">
                <div class="alert-banner">
                    <span class="alert-icon">🔒</span>
                    <div class="alert-text">
                        <strong>Privacy First:</strong> Student records are protected. Use search to access specific information.
                    </div>
                </div>

                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="Search by name or UPI..."
                        autocomplete="off"
                    >
                </div>

                <div class="filter-chips" id="filterChips">
                    <div class="chip active" data-filter="all">All Students</div>
                    <div class="chip" data-filter="verified">Verified</div>
                    <div class="chip" data-filter="male">Male</div>
                    <div class="chip" data-filter="female">Female</div>
                </div>
            </div>

            <div id="resultsHeader" style="display: none;"></div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA_41WpdMjHJOU5s3gQ9aieIayZRvUoRLE",
            authDomain: "kanyadet-school-admin.firebaseapp.com",
            projectId: "kanyadet-school-admin",
            databaseURL: "https://kanyadet-school-admin-default-rtdb.firebaseio.com",
            storageBucket: "kanyadet-school-admin.firebasestorage.app",
            messagingSenderId: "409708360032",
            appId: "1:409708360032:web:a21d63e8cb5fa1ecabee05",
            measurementId: "G-Y4C0ZRRL52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let allStudents = [];
        let currentFilter = 'all';

        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert('Sign in failed: ' + error.message);
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userEmail').textContent = user.email;
                
                loadStudents();
            } else {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function loadStudents() {
            document.getElementById('resultsContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading students...</p></div>';
            
            const studentsRef = ref(db, 'artifacts/default-app-id/students');

            onValue(studentsRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // Use Object.values and map for cleaner data shaping
                    allStudents = Object.values(data).map((studentData, index) => ({
                        // Fallback to key if official field is missing, ensuring a unique ID
                        assessmentNo: studentData['Assessment No'] || Object.keys(data)[index],
                        name: studentData['Official Student Name'] || 'N/A',
                        upi: studentData['UPI'] || 'N/A',
                        status: studentData['Status'] || 'Pending',
                        gender: studentData['Gender'] || 'N/A',
                        dob: studentData['DOB'] || 'N/A',
                        grade: studentData['Grade'] || 'N/A',
                        birthEntry: studentData['Birth Entry'] || 'N/A',
                        class: studentData['Class'] || 'N/A',
                        dateOfAdmission: studentData['DateOfAdmission'] || 'N/A',
                        disability: studentData['Dissability'] || 'None',
                        district: studentData['District'] || 'N/A',
                        email: studentData['Email'] || 'N/A',
                        father: studentData['Father'] || '---',
                        mother: studentData['Mother'] || '---',
                        homePhone: studentData['Home phone'] || '---',
                        idNo: studentData['IDNO'] || '---',
                        medicalCondition: studentData['Medical Condition'] || 'None',
                        whereBorn: studentData['Where Born'] || 'N/A',
                        // Spread the rest of the data
                        ...studentData
                    }));
                    
                    updateStats();
                    showWelcomeMessage();
                } else {
                    allStudents = [];
                    document.getElementById('resultsContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <h3>No Data Found</h3>
                            <p>No student records available in the database.</p>
                        </div>
                    `;
                }
            });
        }

        function updateStats() {
            const total = allStudents.length;
            const males = allStudents.filter(s => s.gender.toLowerCase() === 'male').length;
            const females = allStudents.filter(s => s.gender.toLowerCase() === 'female').length;
            const verified = allStudents.filter(s => s.status.toLowerCase() === 'verified').length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👨</div>
                    <div class="stat-number">${males}</div>
                    <div class="stat-label">Male Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👩</div>
                    <div class="stat-number">${females}</div>
                    <div class="stat-label">Female Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number">${verified}</div>
                    <div class="stat-label">Verified Records</div>
                </div>
            `;
        }

        function showWelcomeMessage() {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="welcome-box">
                    <div class="welcome-icon">👋</div>
                    <h2>Welcome to the Portal</h2>
                    <p>Use the search bar above to find student records by name or UPI number.<br>
                    All student data is securely stored and encrypted.</p>
                </div>
            `;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            if (query.length === 0) {
                showWelcomeMessage();
                document.getElementById('resultsHeader').style.display = 'none';
                document.getElementById('filterChips').style.display = 'flex';
                return;
            }

            if (query.length < 2) return;

            const filtered = allStudents.filter(student => {
                const name = String(student.name || '').toLowerCase();
                const upi = String(student.upi || '').toLowerCase();
                const assessmentNo = String(student.assessmentNo || '').toLowerCase();
                
                return name.includes(query) || 
                       upi.includes(query) || 
                       assessmentNo.includes(query);
            });

            displayResults(filtered, query);
        });

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                
                currentFilter = chip.dataset.filter;
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                
                if (query.length >= 2) {
                    const filtered = allStudents.filter(student => {
                        const name = String(student.name || '').toLowerCase();
                        const upi = String(student.upi || '').toLowerCase();
                        const assessmentNo = String(student.assessmentNo || '').toLowerCase();
                        
                        return name.includes(query) || 
                               upi.includes(query) || 
                               assessmentNo.includes(query);
                    });
                    displayResults(filtered, query);
                }
            });
        });

        function displayResults(students, query = '') {
            let filtered = students;

            if (currentFilter !== 'all') {
                if (currentFilter === 'verified') {
                    filtered = students.filter(s => s.status.toLowerCase() === 'verified');
                } else if (currentFilter === 'male') {
                    filtered = students.filter(s => s.gender.toLowerCase() === 'male');
                } else if (currentFilter === 'female') {
                    filtered = students.filter(s => s.gender.toLowerCase() === 'female');
                }
            }

            const resultsHeader = document.getElementById('resultsHeader');
            const resultsContainer = document.getElementById('resultsContainer');

            if (filtered.length === 0) {
                resultsHeader.style.display = 'none';
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <h3>No Results Found</h3>
                        <p>No students match your search criteria. Try a different query.</p>
                    </div>
                `;
                return;
            }

            resultsHeader.style.display = 'flex';
            resultsHeader.innerHTML = `
                <div class="results-count">
                    Found ${filtered.length} student${filtered.length !== 1 ? 's' : ''}
                    ${query ? ` matching "${query}"` : ''}
                </div>
                <button class="clear-btn" onclick="document.getElementById('searchInput').value = ''; document.getElementById('searchInput').dispatchEvent(new Event('input'));">
                    Clear Search
                </button>
            `;

            resultsContainer.innerHTML = `
                <div class="student-grid">
                    ${filtered.map((student, index) => `
                        <div class="student-card" style="animation-delay: ${index * 0.1}s">
                            <div class="student-header-row">
                                <div class="student-name"><p class="status-verified">${student.grade}</p> --- ${student.name} </div>
                                <span class="status-badge ${student.status.toLowerCase() === 'verified' ? 'status-verified' : 'status-pending'}">
                                    ${student.status}
                                </span>
                            </div>
                            <div class="details-grid">
                                <div class="detail-box">
                                    <div class="detail-label">Assessment No</div>
                                    <div class="detail-value">${student.assessmentNo}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">UPI Number</div>
                                    <div class="detail-value">${student.upi}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Gender</div>
                                    <div class="detail-value">${student.gender}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Date of Birth</div>
                                    <div class="detail-value">${student.dob}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Grade</div>
                                    <div class="detail-value">${student.grade}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Class</div>
                                    <div class="detail-value">${student.class}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Birth Entry</div>
                                    <div class="detail-value">${student.birthEntry}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Date of Admission</div>
                                    <div class="detail-value">${student.dateOfAdmission}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">District</div>
                                    <div class="detail-value">${student.district}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Where Born</div>
                                    <div class="detail-value">${student.whereBorn}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Father</div>
                                    <div class="detail-value">${student.father}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Mother</div>
                                    <div class="detail-value">${student.mother}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Email</div>
                                    <div class="detail-value">${student.email}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Home Phone</div>
                                    <div class="detail-value">${student.homePhone}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Medical Condition</div>
                                    <div class="detail-value">${student.medicalCondition}</div>
                                </div>
                                <div class="detail-box">
                                    <div class="detail-label">Disability</div>
                                    <div class="detail-value">${student.disability}</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
