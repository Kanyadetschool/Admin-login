            color: #ffffff;
        }
        .grade-toggle-btn:hover, .export-btn:hover {

        }

      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithCustomToken, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove, update,get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const sanitizedAppId = appId.replace(/\./g, '_');
        const customFirebaseConfig = {
            apiKey: "AIzaSyA_41WpdMjHJOU5s3gQ9aieIayZRvUoRLE",
            authDomain: "kanyadet-school-admin.firebaseapp.com",
            projectId: "kanyadet-school-admin",
            databaseURL: "https://kanyadet-school-admin-default-rtdb.firebaseio.com",
            storageBucket: "kanyadet-school-admin.firebasestorage.app",
            messagingSenderId: "409708360032",
            appId: "1:409708360032:web:a21d63e8cb5fa1ecabee05",
            measurementId: "G-Y4C0ZRRL52"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : customFirebaseConfig;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db, auth, userId = null;
        let studentsData = [];
        let currentPage = 1;
        let studentsPerPage = 10;
        let selectedStudentIds = new Set(); // New Set to track selected student IDs

        const deleteGradeBtn = document.getElementById('delete-grade-btn');
        const studentsPerPageSelect = document.getElementById('students-per-page');
        const fileInput = document.getElementById('file-input');
        const manualForm = document.getElementById('manual-form');
        const addFieldBtn = document.getElementById('add-field-btn');
        const customFieldsContainer = document.getElementById('custom-fields-container');
        const dataDisplay = document.getElementById('data-display');
        const statusMessage = document.getElementById('status-message');
        const modal = document.getElementById('message-modal');
        const modalText = document.getElementById('modal-text');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const userIdDisplay = document.getElementById('user-id-display');
        const loader = document.getElementById('loader');
        const signInSection = document.getElementById('sign-in-section');
        const dataSection = document.getElementById('data-section');
        const signInGoogleBtn = document.getElementById('sign-in-google-btn');
        const signInFingerprintBtn = document.getElementById('sign-in-fingerprint-btn');
        const signOutBtn = document.getElementById('sign-out-btn');
        const excelUploadSection = document.getElementById('excel-upload-section');
        const manualEntrySection = document.getElementById('manual-entry-section');
        const printAllBtn = document.getElementById('print-all-btn');
        const gradeFilterSelect = document.getElementById('grade-filter-select');
        const printGradeBtn = document.getElementById('print-grade-btn');
        const printModal = document.getElementById('print-modal');
        const closePrintModalBtn = document.getElementById('close-print-modal-btn');
        const printExcelBtn = document.getElementById('print-excel-btn');
        const printWordBtn = document.getElementById('print-word-btn');
        const printPdfBtn = document.getElementById('print-pdf-btn');
        const searchInput = document.getElementById('search-input');
        const statsSection = document.getElementById('stats-section');
        const pdfModalBackdrop = document.getElementById('pdf-modal-backdrop');
        const pdfIframe = document.getElementById('pdf-iframe');
        const closePdfModalBtn = document.getElementById('close-pdf-modal-btn');
        const pdfModalStudentImage = document.getElementById('pdf-modal-student-image');
        const pdfModalStudentName = document.getElementById('pdf-modal-student-name');

        const deleteSelectedBtn = document.getElementById('delete-selected-btn');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalText = document.getElementById('confirm-modal-text');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
        const cancelDeleteBtn = document.getElementById('cancel-delete-btn');


        const showModal = (message) => {
            modalText.textContent = message;
            modal.classList.remove('hidden');
        };

        studentsPerPageSelect.addEventListener('change', (e) => {
            studentsPerPage = parseInt(e.target.value);
            currentPage = 1;
            const selectedGrade = gradeFilterSelect.value;
            const searchTerm = searchInput.value;

            if (selectedGrade) {
                const filteredStudents = studentsData.filter(student => student.Grade === selectedGrade);
                renderStudents(filteredStudents, { field: 'Grade', value: selectedGrade });
            } else if (searchTerm) {
                const searchTermLower = searchTerm.toLowerCase();
                const filteredStudents = studentsData.filter(student => 
                    Object.values(student).some(value => 
                        String(value).toLowerCase().includes(searchTermLower)
                    )
                );
                renderStudents(filteredStudents, { field: 'Search', value: searchTerm });
            } else {
                renderStudents(studentsData);
            }
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        printAllBtn.addEventListener('click', () => {
            gradeFilterSelect.value = '';
            printModal.classList.remove('hidden');
        });

        printGradeBtn.addEventListener('click', () => {
            printModal.classList.remove('hidden');
        });

        closePrintModalBtn.addEventListener('click', () => {
            printModal.classList.add('hidden');
        });

        closePdfModalBtn.addEventListener('click', () => {
            pdfModalBackdrop.classList.add('hidden');
            pdfModalBackdrop.classList.remove('flex');
            pdfIframe.src = '';
            pdfModalStudentImage.src = '';
            pdfModalStudentName.textContent = '';
        });

        const signInWithGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Error during Google sign-in:", error);
                showModal(`Failed to sign in with Google: ${error.message}`);
            }
        };

        const signInWithFingerprint = async () => {
            if (!window.PublicKeyCredential) {
                showModal("Fingerprint authentication not supported on this device or browser.");
                return;
            }
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                let credential;
                try {
                    credential = await navigator.credentials.get({
                        publicKey: {
                            challenge: challenge,
                            rpId: window.location.hostname,
                            userVerification: 'required',
                        }
                    });
                } catch (e) {
                    credential = await navigator.credentials.create({
                        publicKey: {
                            challenge: challenge,
                            rp: {
                                name: "Student Data Uploader",
                                id: window.location.hostname,
                            },
                            user: {
                                id: new Uint8Array(16),
                                name: "webauthn-user",
                                displayName: "WebAuthn User",
                            },
                            pubKeyCredParams: [{
                                type: "public-key",
                                alg: -7
                            }],
                            timeout: 60000,
                            attestation: "direct"
                        }
                    });
                }
                showModal("Successfully authenticated with fingerprint!");
                const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                await signInWithCustomToken(auth, credentialId);
            } catch (error) {
                console.error("Error during fingerprint sign-in:", error);
                showModal(`Fingerprint authentication failed: ${error.message}`);
            }
        };

        const signOutUser = async () => {
            try {
                await signOut(auth);
                showModal("You have been signed out.");
            } catch (error) {
                console.error("Error during sign-out:", error);
                showModal("Failed to sign out. Check console for details.");
            }
        };

        if (signInGoogleBtn) {
            signInGoogleBtn.addEventListener('click', signInWithGoogle);
        }
        if (signInFingerprintBtn) {
            signInFingerprintBtn.addEventListener('click', signInWithFingerprint);
        }
        signOutBtn.addEventListener('click', signOutUser);

        const setupFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getDatabase(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("Authenticated with user ID:", userId);
                        const email = user.email;
                        let username = email.split("@")[0];
                        username = username.replace(/[^a-zA-Z]/g, "");
                        let spacedName = username.replace(/([a-z])([A-Z])/g, '$1 $2');
                        spacedName = spacedName.replace(/\b\w/g, char => char.toUpperCase());
                        userIdDisplay.textContent = `${spacedName}`;

                        if (user.photoURL) {
                            const userImg = document.createElement("img");
                            userImg.src = user.photoURL;
                            userImg.alt = "User profile picture";
                            userImg.style.width = "50px";
                            userImg.style.height = "50px";
                            userImg.style.borderRadius = "50%";
                            userIdDisplay.insertAdjacentElement("beforebegin", userImg);
                        }

                        signInSection.classList.add('hidden');
                        dataSection.classList.remove('hidden');

                        const studentsRef = ref(db, `artifacts/${sanitizedAppId}/students`);
                        onValue(studentsRef, (snapshot) => {
                            const students = [];
                            const data = snapshot.val();
                            if (data) {
                                for (let key in data) {
                                    students.push({ id: key, ...data[key] });
                                }
                            }
                            students.sort((a, b) => {
                                const assessmentNoA = parseFloat(a['Assessment No']) || Infinity;
                                const assessmentNoB = parseFloat(b['Assessment No']) || Infinity;
                                return assessmentNoA - assessmentNoB;
                            });
                            studentsData = students;
                            currentPage = 1;
                            populateFilters(students);
                            renderStudents(students);
                            loader.classList.add('hidden');
                        }, (error) => {
                            console.error("Error fetching students:", error);
                            showModal(`Error fetching data: ${error.message}`);
                            loader.classList.add('hidden');
                        });
                    } else {
                        userId = null;
                        userIdDisplay.textContent = `User ID: Not Signed In`;
                        signInSection.classList.remove('hidden');
                        dataSection.classList.add('hidden');
                        loader.classList.add('hidden');
                        dataDisplay.innerHTML = '';
                    }
                });
            } catch (e) {
                console.error("Error setting up Firebase: ", e);
                showModal(`Failed to initialize application. Check console for details.`);
                loader.classList.add('hidden');
            }
        };

        const populateFilters = (students) => {
            const grades = new Set();
            students.forEach(student => {
                if (student.Grade) {
                    grades.add(student.Grade);
                }
            });
            
            gradeFilterSelect.innerHTML = '<option value="">All Grades</option>';
            const sortedGrades = Array.from(grades).sort();
            sortedGrades.forEach(gradeName => {
                const option = document.createElement('option');
                option.value = gradeName;
                option.textContent = gradeName;
                gradeFilterSelect.appendChild(option);
            });
            
            if (students.length > 0) {
                printAllBtn.classList.remove('hidden');
            } else {
                printAllBtn.classList.add('hidden');
            }
        };

      // Update the gradeFilterSelect event listener to show the delete button
gradeFilterSelect.addEventListener('change', () => {
    const selectedGrade = gradeFilterSelect.value;
    searchInput.value = '';
    currentPage = 1;
    if (selectedGrade) {
        const filteredStudents = studentsData.filter(student => student.Grade === selectedGrade);
        renderStudents(filteredStudents, { field: 'Grade', value: selectedGrade });
        printGradeBtn.classList.remove('hidden');
        deleteGradeBtn.classList.remove('hidden'); // Show the delete button
    } else {
        renderStudents(studentsData);
        printGradeBtn.classList.add('hidden');
        deleteGradeBtn.classList.add('hidden'); // Hide the delete button
    }
});

        const readFileAsArrayBuffer = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(file);
            });
        };

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusMessage.textContent = 'Processing file...';
            statusMessage.classList.remove('hidden');
            loader.classList.remove('hidden');

            try {
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (jsonRows.length < 2) {
                    throw new Error("File must contain a header row and at least one data row.");
                }

                const headers = jsonRows[0].map(h => String(h).trim());
                const studentData = jsonRows.slice(1);

                if (!headers.includes("Assessment No")) {
                    throw new Error("Excel file must have a column titled 'Assessment No'.");
                }
                const assessmentNoIndex = headers.indexOf("Assessment No");

                const studentsRef = ref(db, `artifacts/${sanitizedAppId}/students`);
                for (const row of studentData) {
                    const assessmentNo = row[assessmentNoIndex];
                    if (!assessmentNo) {
                        console.warn("Skipping row with missing 'Assessment No'.");
                        continue;
                    }
                    const studentDocKey = String(assessmentNo);
                    const studentObj = {};
                    headers.forEach((header, index) => {
                        studentObj[header] = row[index];
                    });
                    await set(ref(db, `artifacts/${sanitizedAppId}/students/${studentDocKey}`), studentObj);
                }

                statusMessage.textContent = 'Data uploaded successfully!';
                statusMessage.classList.remove('hidden');
                setTimeout(() => statusMessage.classList.add('hidden'), 3000);
            } catch (error) {
                console.error("Error processing file:", error);
                statusMessage.textContent = `Error: ${error.message}`;
                statusMessage.classList.add('text-red-600');
            } finally {
                loader.classList.add('hidden');
            }
        });
        
        // Manual entry form submission
        manualForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(manualForm);
            const studentObj = {};
            for (const [key, value] of formData.entries()) {
                if (key === 'assessmentNo') {
                    studentObj['Assessment No'] = value;
                } else if (key === 'studentName') {
                    studentObj['Official Student Name'] = value;
                } else if (key === 'studentClass') {
                    studentObj['Class'] = value;
                } else if (key === 'studentGrade') {
                    studentObj['Grade'] = value;
                } else {
                    studentObj[key] = value;
                }
            }

            if (!studentObj['Assessment No']) {
                showModal("Assessment No is required.");
                return;
            }

            loader.classList.remove('hidden');
            try {
                const studentRef = ref(db, `artifacts/${sanitizedAppId}/students/${studentObj['Assessment No']}`);
                await set(studentRef, studentObj);
                manualForm.reset();
                customFieldsContainer.innerHTML = '';
                showModal("Student added successfully!");
            } catch (error) {
                console.error("Error adding student:", error);
                showModal(`Failed to add student: ${error.message}`);
            } finally {
                loader.classList.add('hidden');
            }
        });
        
        addFieldBtn.addEventListener('click', () => {
            const fieldGroup = document.createElement('div');
            fieldGroup.className = 'flex space-x-2 items-center mb-2';
            fieldGroup.innerHTML = `
                <input type="text" placeholder="Field Name" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-1/2">
                <input type="text" placeholder="Value" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-1/2">
                <button type="button" class="remove-field-btn px-2 py-1 bg-red-500 text-white rounded-md hover:bg-red-600 transition">Remove</button>
            `;
            customFieldsContainer.appendChild(fieldGroup);
            const newFieldInputs = fieldGroup.querySelectorAll('input');
            const removeBtn = fieldGroup.querySelector('.remove-field-btn');
            
            newFieldInputs.forEach(input => {
                input.addEventListener('change', () => {
                    const fieldName = newFieldInputs[0].value;
                    const fieldValue = newFieldInputs[1].value;
                    if (fieldName) {
                        newFieldInputs[1].name = fieldName;
                    }
                });
            });

            removeBtn.addEventListener('click', () => {
                fieldGroup.remove();
            });
        });

        // Delete all students in the current grade
        deleteGradeBtn.addEventListener('click', () => {
            const selectedGrade = gradeFilterSelect.value;
            if (!selectedGrade) {
                showModal("Please select a grade to delete.");
                return;
            }
            if (confirm(`Are you sure you want to delete all students in grade "${selectedGrade}"? This action cannot be undone.`)) {
                const studentsToDelete = studentsData.filter(student => student.Grade === selectedGrade);
                const deletePromises = studentsToDelete.map(student => 
                    remove(ref(db, `artifacts/${sanitizedAppId}/students/${student.id}`))
                );
                Promise.all(deletePromises)
                    .then(() => showModal(`Successfully deleted all students in grade "${selectedGrade}".`))
                    .catch(error => {
                        console.error("Error deleting students:", error);
                        showModal(`Failed to delete students: ${error.message}`);
                    });
            }
        });

        // Function to update the state of the "Delete Selected" button
        const updateDeleteButtonState = () => {
            if (selectedStudentIds.size > 0) {
                deleteSelectedBtn.classList.remove('hidden');
            } else {
                deleteSelectedBtn.classList.add('hidden');
            }
        };

        // Main function to render the student table
        const renderStudents = (students) => {
            selectedStudentIds.clear(); // Clear selections on new render
            updateDeleteButtonState();
            
            const start = (currentPage - 1) * studentsPerPage;
            const end = start + studentsPerPage;
            const studentsToDisplay = students.slice(start, end);

            if (students.length === 0) {
                dataDisplay.innerHTML = '<p class="text-center text-gray-500">No student records found.</p>';
                return;
            }

            const headers = Object.keys(students[0]).filter(key => key !== 'id');
            const tableHeaders = ['Select', ...headers, 'Actions']; // Add Select to the header

            let tableHTML = `
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                <input type="checkbox" id="master-checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            </th>
            `;
            tableHeaders.slice(1).forEach(header => {
                tableHTML += `<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${header}</th>`;
            });
            tableHTML += `</tr></thead><tbody class="bg-white divide-y divide-gray-200">`;

            studentsToDisplay.forEach(student => {
                tableHTML += `<tr data-student-id="${student.id}" class="hover:bg-gray-50">`;
                tableHTML += `<td class="px-6 py-4 whitespace-nowrap"><input type="checkbox" class="student-checkbox h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" data-id="${student.id}" ${selectedStudentIds.has(student.id) ? 'checked' : ''}></td>`;
                headers.forEach(header => {
                    const value = student[header] !== undefined && student[header] !== null ? student[header] : 'N/A';
                    tableHTML += `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${value}</td>`;
                });
                tableHTML += `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="text-indigo-600 hover:text-indigo-900 mx-2 edit-btn" data-id="${student.id}">Edit</button>
                        <button class="text-red-600 hover:text-red-900 delete-btn" data-id="${student.id}">Delete</button>
                    </td>
                </tr>`;
            });
            tableHTML += `</tbody></table>`;
            dataDisplay.innerHTML = tableHTML;
            addPaginationControls(students.length);
            addEventListeners();
        };

        const addEventListeners = () => {
            // Master checkbox event listener
            const masterCheckbox = document.getElementById('master-checkbox');
            if (masterCheckbox) {
                masterCheckbox.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    const studentCheckboxes = document.querySelectorAll('.student-checkbox');
                    studentCheckboxes.forEach(checkbox => {
                        checkbox.checked = isChecked;
                        const studentId = checkbox.dataset.id;
                        if (isChecked) {
                            selectedStudentIds.add(studentId);
                        } else {
                            selectedStudentIds.delete(studentId);
                        }
                    });
                    updateDeleteButtonState();
                });
            }

            // Individual student checkbox event listener
            document.querySelectorAll('.student-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const studentId = e.target.dataset.id;
                    if (e.target.checked) {
                        selectedStudentIds.add(studentId);
                    } else {
                        selectedStudentIds.delete(studentId);
                    }
                    updateDeleteButtonState();
                    const allCheckboxes = document.querySelectorAll('.student-checkbox');
                    const isAllChecked = Array.from(allCheckboxes).every(cb => cb.checked);
                    if (masterCheckbox) {
                        masterCheckbox.checked = isAllChecked;
                    }
                });
            });

            // Delete Selected button event listener
            deleteSelectedBtn.addEventListener('click', () => {
                if (selectedStudentIds.size === 0) {
                    showModal("No students selected for deletion.");
                    return;
                }
                confirmModalText.textContent = `Are you sure you want to delete ${selectedStudentIds.size} selected student(s)? This action cannot be undone.`;
                confirmModal.classList.remove('hidden');
            });

            // Confirm delete button listener
            confirmDeleteBtn.addEventListener('click', async () => {
                confirmModal.classList.add('hidden');
                loader.classList.remove('hidden');
                
                const deletePromises = Array.from(selectedStudentIds).map(id => {
                    return remove(ref(db, `artifacts/${sanitizedAppId}/students/${id}`));
                });

                try {
                    await Promise.all(deletePromises);
                    showModal(`Successfully deleted ${selectedStudentIds.size} student(s).`);
                    selectedStudentIds.clear();
                    updateDeleteButtonState();
                } catch (error) {
                    console.error("Error deleting selected students:", error);
                    showModal(`Failed to delete selected students: ${error.message}`);
                } finally {
                    loader.classList.add('hidden');
                }
            });

            // Cancel delete button listener
            cancelDeleteBtn.addEventListener('click', () => {
                confirmModal.classList.add('hidden');
            });


            // Existing edit/delete buttons
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const studentToEdit = studentsData.find(s => s.id === id);
                    if (studentToEdit) {
                        // Implement edit logic here (e.g., populate a modal form)
                        console.log('Edit student:', studentToEdit);
                        showModal(`Editing student with ID: ${id}`);
                    }
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    if (confirm("Are you sure you want to delete this student?")) {
                        loader.classList.remove('hidden');
                        remove(ref(db, `artifacts/${sanitizedAppId}/students/${id}`))
                            .then(() => showModal("Student deleted successfully!"))
                            .catch(error => {
                                console.error("Error deleting student:", error);
                                showModal(`Failed to delete student: ${error.message}`);
                            })
                            .finally(() => loader.classList.add('hidden'));
                    }
                });
            });
        };

        const addPaginationControls = (totalStudents) => {
            const totalPages = Math.ceil(totalStudents / studentsPerPage);
            const paginationContainer = document.createElement('div');
            paginationContainer.className = 'flex justify-center mt-4';
            paginationContainer.innerHTML = `
                <button id="prev-btn" class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                <div id="page-numbers" class="flex items-center mx-2"></div>
                <button id="next-btn" class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
            `;
            
            dataDisplay.appendChild(paginationContainer);
            
            const pageNumbersContainer = document.getElementById('page-numbers');
            const maxPageButtons = 5;
            let startPage, endPage;

            if (totalPages <= maxPageButtons) {
                startPage = 1;
                endPage = totalPages;
            } else {
                startPage = Math.max(1, currentPage - Math.floor(maxPageButtons / 2));
                endPage = Math.min(totalPages, startPage + maxPageButtons - 1);
                if (endPage === totalPages) {
                    startPage = Math.max(1, endPage - maxPageButtons + 1);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    const selectedGrade = gradeFilterSelect.value;
                    const searchTerm = searchInput.value;
                    let studentsToRender = studentsData;
                    if (selectedGrade) {
                        studentsToRender = studentsData.filter(student => student.Grade === selectedGrade);
                    } else if (searchTerm) {
                        const searchTermLower = searchTerm.toLowerCase();
                        studentsToRender = studentsData.filter(student =>
                            Object.values(student).some(value =>
                                String(value).toLowerCase().includes(searchTermLower)
                            )
                        );
                    }
                    renderStudents(studentsToRender);
                });
                pageNumbersContainer.appendChild(pageBtn);
            }

            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    const selectedGrade = gradeFilterSelect.value;
                    const searchTerm = searchInput.value;
                    let studentsToRender = studentsData;
                    if (selectedGrade) {
                        studentsToRender = studentsData.filter(student => student.Grade === selectedGrade);
                    } else if (searchTerm) {
                        const searchTermLower = searchTerm.toLowerCase();
                        studentsToRender = studentsData.filter(student =>
                            Object.values(student).some(value =>
                                String(value).toLowerCase().includes(searchTermLower)
                            )
                        );
                    }
                    renderStudents(studentsToRender);
                }
            });
            
            document.getElementById('next-btn').addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    const selectedGrade = gradeFilterSelect.value;
                    const searchTerm = searchInput.value;
                    let studentsToRender = studentsData;
                    if (selectedGrade) {
                        studentsToRender = studentsData.filter(student => student.Grade === selectedGrade);
                    } else if (searchTerm) {
                        const searchTermLower = searchTerm.toLowerCase();
                        studentsToRender = studentsData.filter(student =>
                            Object.values(student).some(value =>
                                String(value).toLowerCase().includes(searchTermLower)
                            )
                        );
                    }
                    renderStudents(studentsToRender);
                }
            });
        };

        setupFirebase();
    </script>
